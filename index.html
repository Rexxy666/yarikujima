<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>浮島記帳・GameFi 虛擬寵物</title>
<style>
/* ===== 全域像素風 ===== */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#2b2233; --panel:#fff8ec; --panel2:#ffeecf; --line:#3a2e4a;
  --gold:#ffcc33; --coin:#f5a623; --gem:#4fc3f7; --good:#4caf50; --bad:#e05a5a;
  --wood:#8a5a2b; --wood2:#6b4420; --sky1:#7ec8ff; --sky2:#bdeaff;
  --font:"Segoe UI",-apple-system,"PingFang TC","Microsoft JhengHei","Noto Sans TC",sans-serif;
  --hud-h:58px;
}
html,body{height:100%}
body{
  font-family:var(--font); color:var(--ink); background:#1b1524;
  display:flex; justify-content:center; overflow:hidden;
  image-rendering:pixelated;
}
#app{
  position:relative; width:100%; max-width:460px; height:100vh; height:100dvh;
  background:#241a30; display:flex; flex-direction:column; overflow:hidden;
  box-shadow:0 0 40px rgba(0,0,0,.6);
}
.pixel-border{border:3px solid var(--line); box-shadow:0 3px 0 var(--line), inset 0 0 0 2px #fff6}
button{font-family:var(--font); cursor:pointer; border:none; color:inherit}
.btn{
  background:var(--gold); color:#4a3410; font-weight:800; padding:11px 14px;
  border:3px solid var(--line); border-radius:4px; box-shadow:0 4px 0 var(--wood2);
  transition:transform .05s, box-shadow .05s; letter-spacing:.5px;
}
.btn:active{transform:translatey(3px); box-shadow:0 1px 0 var(--wood2)}
.btn.sec{background:#c9b8e0; color:#33254a; box-shadow:0 4px 0 #6b5a8a}
.btn.danger{background:var(--bad); color:#fff; box-shadow:0 4px 0 #8a2f2f}
.btn.ghost{background:#fff8ec; box-shadow:0 4px 0 #b8a98a}
.btn.sm{padding:7px 10px; font-size:12px; box-shadow:0 3px 0 var(--wood2)}
.btn:disabled{filter:grayscale(.7); opacity:.6; box-shadow:0 4px 0 #777; cursor:not-allowed}

/* ===== HUD ===== */
#hud{
  position:absolute; top:0; left:0; right:0; z-index:8; display:flex; align-items:center; gap:8px;
  padding:9px 10px;
  background:linear-gradient(180deg, rgba(255,255,255,.55), rgba(255,255,255,.05));
  -webkit-backdrop-filter:blur(14px) saturate(1.15); backdrop-filter:blur(14px) saturate(1.15);
  border-bottom:1px solid rgba(255,255,255,.4);
}
.stat-pill{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.74);border:1px solid rgba(255,255,255,.7);
  border-radius:20px;padding:4px 11px 4px 6px;font-weight:800;color:#2B2233;font-size:13px;box-shadow:0 2px 8px rgba(30,20,55,.10)}
.stat-pill .ic{width:20px;height:20px;display:grid;place-items:center;border-radius:50%;font-size:13px}
img.ic{width:22px;height:22px;object-fit:contain;image-rendering:pixelated;background:none;border-radius:0}
.money-ic{height:1.05em;width:auto;vertical-align:-.2em;display:inline-block;object-fit:contain;image-rendering:pixelated}
.money-ic.gem{margin-right:5px}
.money-ic.sm{height:1em;vertical-align:-.15em}
img.ic.gem{margin-right:5px}
.stat-pill:has(#gemIc){gap:8px}
.toast .money-ic{height:15px;vertical-align:-2px}
.tx-amt .money-ic{height:14px;vertical-align:-2px}
.bub .money-ic{height:14px;vertical-align:-2px}
#lvlWrap{flex:1;min-width:0}
#lvlWrap .lv{font-size:11px;color:#8a5a10;font-weight:800;display:flex;justify-content:space-between;text-shadow:0 1px 0 rgba(255,255,255,.5)}
.xpbar{height:9px;background:rgba(80,60,110,.16);border:1px solid rgba(255,255,255,.5);border-radius:6px;overflow:hidden;margin-top:2px}
.xpbar>i{display:block;height:100%;background:linear-gradient(#ffe08a,#f5a623);width:0%}
#gear{position:relative;background:transparent;border:none;border-radius:50%;width:36px;height:36px;
  display:grid;place-items:center;padding:0;cursor:pointer;flex:none;-webkit-tap-highlight-color:transparent}
#gear .gear-glow{position:absolute;inset:1px;border-radius:50%;opacity:0;pointer-events:none;
  background:radial-gradient(circle,rgba(255,255,255,.42) 0%,rgba(255,255,255,.12) 52%,transparent 72%);
  transition:opacity .16s ease}
#gear:hover .gear-glow,#gear:focus-visible .gear-glow{opacity:1}
#gear:active .gear-glow{opacity:1;background:radial-gradient(circle,rgba(255,255,255,.62) 0%,rgba(255,255,255,.18) 48%,transparent 70%)}
#gear .gear-icon{width:24px;height:24px;display:block;image-rendering:pixelated;shape-rendering:crispEdges;
  filter:drop-shadow(0 1px 0 rgba(43,34,51,.35))}
#gear:active .gear-icon{transform:scale(.94)}

/* ===== 場景 ===== */
#scene{position:relative;flex:1;overflow:hidden;transition:background 1.2s ease;
  background:linear-gradient(#5db8ff 0%,#8fd0ff 55%,#bde9ff 100%)}
/* 動態時段天空 */
#scene[data-tod="day"]{background:linear-gradient(#5db8ff 0%,#8fd0ff 55%,#bde9ff 100%)}
#scene[data-tod="dawn"]{background:linear-gradient(#7fa8d8 0%,#f0c9a0 60%,#ffe6c8 100%)}
#scene[data-tod="dusk"]{background:linear-gradient(#ff9e6d 0%,#ffbe8f 45%,#ffd9a8 100%)}
#scene[data-tod="night"]{background:linear-gradient(#141a3a 0%,#26305e 55%,#3a4270 100%)}
/* 場景 carousel */
#sceneTrack{display:flex;height:100%;width:300%;transform:translate3d(0,0,0);
  transition:transform .42s cubic-bezier(.25,1,.5,1);will-change:transform}
#sceneTrack.dragging{transition:none}
.scene-page{position:relative;width:33.3333%;height:100%;flex:none;overflow:hidden}
.scene-isle{position:absolute;left:50%;top:50%;width:440px;max-width:92%;transform:translate(-50%,-50%);
  animation:sceneFloat 5.5s ease-in-out infinite}
@keyframes sceneFloat{0%,100%{transform:translate(-50%,-50%)}50%{transform:translate(-50%,calc(-50% - 7px))}}
.scene-isle-img{display:block;width:100%;height:auto;filter:drop-shadow(0 12px 14px rgba(0,0,0,.2))}
.scene-isle-float{position:relative;overflow:visible;width:100%;--pet-h:120px;--px:50%;--py:56%}
.scene-click-layer{position:absolute;inset:0;z-index:1;cursor:crosshair;touch-action:manipulation}
.scene-click-markers{position:absolute;inset:0;z-index:4;pointer-events:none;overflow:visible}
#pageDots{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);z-index:7;display:flex;gap:7px}
#pageDots i{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.5);border:1px solid rgba(0,0,0,.12);transition:.22s}
#pageDots i.on{background:#fff;width:18px;border-radius:4px}
.edge-hint{position:absolute;top:0;bottom:0;width:24px;z-index:6;pointer-events:none;opacity:.45;transition:opacity .3s}
.edge-hint.l{left:0;background:linear-gradient(90deg,rgba(0,0,0,.13),transparent)}
.edge-hint.r{right:0;background:linear-gradient(270deg,rgba(0,0,0,.13),transparent)}
.edge-hint.hide{opacity:0}
.sky-moon{position:absolute;top:24px;right:30px;width:44px;height:44px;border-radius:50%;
  background:radial-gradient(circle at 38% 35%,#fdf6d8,#e8e2b8);box-shadow:0 0 26px #fdf6c8aa;opacity:0;transition:opacity 1.2s}
.sky-stars{position:absolute;inset:0;opacity:0;transition:opacity 1.2s;pointer-events:none}
.sky-stars::before{content:"";position:absolute;top:8%;left:12%;width:2px;height:2px;border-radius:50%;background:#fff;
  box-shadow:40px 20px 0 #fff,120px 8px 0 #fff,200px 40px 0 #fff,260px 14px 0 #fff,90px 60px 0 #fff,300px 70px 0 #fff,160px 90px 0 #fff,220px 120px 0 #fff,60px 110px 0 #fff,340px 30px 0 #fff,20px 80px 0 #fff,140px 30px 0 #fff,280px 100px 0 #fff}
.pstat.hunger,.pstat.happy,.pstat.health{cursor:pointer}
.sun{position:absolute;top:24px;right:26px;width:52px;height:52px;border-radius:50%;
  background:radial-gradient(circle at 40% 35%,#fff2b0,#ffd93b);box-shadow:0 0 0 6px #fff59d55,0 0 30px #ffe07a;transition:opacity .6s}
.cloud{position:absolute;background:#fff;border-radius:20px;opacity:.9;
  box-shadow:18px 6px 0 -2px #fff,36px 0 0 -6px #fff, -14px 6px 0 -4px #fff}
.cloud.c1{width:52px;height:20px;top:40px;left:24px;animation:drift 26s linear infinite}
.cloud.c2{width:40px;height:16px;top:96px;left:60%;opacity:.75;animation:drift 34s linear infinite}
@keyframes drift{0%{transform:translateX(-20px)}50%{transform:translateX(40px)}100%{transform:translateX(-20px)}}
#rain{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity .6s;overflow:hidden}
#rain.on{opacity:1}
.drop{position:absolute;top:-12px;width:2px;height:12px;background:#cfe8ff;opacity:.8;animation:fall linear infinite}
@keyframes fall{to{transform:translateY(120vh)}}

/* 浮島 */
#island{position:absolute;left:50%;top:46%;width:78%;max-width:400px;text-align:center;
  transform:translate(-50%,calc(-50% - var(--parallax-y,0px)));opacity:var(--parallax-op,1);
  transition:opacity .28s ease,top .28s ease;will-change:transform,opacity;pointer-events:auto}
#island #petAnchor,#island #speech{pointer-events:auto}
#isleClickLayer{position:absolute;inset:0;z-index:1;cursor:crosshair;touch-action:manipulation}
#clickMarkers{position:absolute;inset:0;z-index:4;pointer-events:none;overflow:visible}
/* 首頁陪玩物件（浮島上隨機出現的小物） */
.home-obj{position:absolute;width:20px;height:20px;transform:translate(-50%,-62%);image-rendering:pixelated;
  cursor:pointer;z-index:3;pointer-events:auto;animation:objBob 1.5s ease-in-out infinite;
  filter:drop-shadow(0 0 5px rgba(120,200,255,.75))}
@keyframes objBob{0%,100%{transform:translate(-50%,-62%) translateY(0)}50%{transform:translate(-50%,-62%) translateY(-5px)}}
.home-obj.home-obj-coin{filter:drop-shadow(0 0 7px rgba(255,210,90,.8))}
.home-obj.home-obj-exp{filter:drop-shadow(0 0 7px rgba(120,190,255,.85))}
.home-obj.eaten{animation:none;transition:transform .2s ease,opacity .2s ease;transform:translate(-50%,-90%) scale(.35);opacity:0}
.click-marker{position:absolute;width:26px;height:26px;margin:-13px 0 0 -13px;border:2.5px solid rgba(255,208,72,.95);
  border-radius:50%;pointer-events:none;box-sizing:border-box;
  animation:clickRipple .68s ease-out forwards}
.click-marker::after{content:"";position:absolute;inset:4px;border:1.5px solid rgba(255,255,255,.75);border-radius:50%}
@keyframes clickRipple{0%{transform:scale(.3);opacity:1;box-shadow:0 0 0 0 rgba(255,208,72,.45)}
  100%{transform:scale(2.1);opacity:0;box-shadow:0 0 0 12px rgba(255,208,72,0)}}
.isle-float{position:relative;overflow:visible;animation:isleFloat 5.5s ease-in-out infinite;
  --pet-h:118px;--speech-gap:12px;--speech-arrow:8px;--speech-bob:6px}
@keyframes isleFloat{0%,100%{transform:translateY(0)}
  50%{transform:translateY(-7px)}}
#isleImg{display:block;width:100%;height:auto;filter:drop-shadow(0 14px 18px rgba(0,0,0,.18))}
/* 寵物站在浮島草地上 */
.pet-shadow,.pet-stage-shadow{position:absolute;left:var(--px,50%);top:var(--py,40%);transform:translate(-50%,-35%);
  width:62px;height:14px;z-index:1;pointer-events:none;
  background:radial-gradient(ellipse at center,rgba(0,0,0,.15) 0%,rgba(0,0,0,0) 72%);border-radius:50%;
  animation:shadowPulse 5.5s ease-in-out infinite}
@keyframes shadowPulse{0%,100%{opacity:.9;transform:translate(-50%,-35%) scaleX(1)}
  50%{opacity:.65;transform:translate(-50%,-35%) scaleX(.86)}}
/* 寵物 + 對話框錨點（對話框永遠在寵物頭頂上方） */
#petAnchor,.pet-stage-anchor{position:absolute;left:var(--px,50%);top:var(--py,40%);transform:translate(-50%,-100%);
  width:108px;height:var(--pet-h,120px);z-index:2;animation:bob 2.4s ease-in-out infinite;pointer-events:none;overflow:visible}
#petAnchor.sick,.pet-stage-anchor.sick{animation:shiver .28s infinite}
#petAnchor.pet-sprite-active,.pet-stage-anchor.pet-sprite-active{animation:none;will-change:left,top}
/* 老虎精靈圖已用 tiger2/tiger3 幀表達心情，不再疊加錨點抖動 */
#petAnchor.pet-sprite-active.sick,.pet-stage-anchor.pet-sprite-active.sick,
#petAnchor.pet-sprite-active.pet-distressed,.pet-stage-anchor.pet-sprite-active.pet-distressed{animation:none}
.petTear{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-size:14px;z-index:4;animation:tearDrop 1.4s ease-in-out infinite}
@keyframes tearDrop{0%,100%{opacity:.85;transform:translateX(-50%) translateY(0)}50%{opacity:1;transform:translateX(-50%) translateY(3px)}}
@keyframes petBudgetShiver{
  0%,100%{transform:translate(-50%,-100%) translate(0,0)}
  25%{transform:translate(-50%,-100%) translate(-2.5px,.4px)}
  50%{transform:translate(-50%,-100%) translate(2.5px,-.4px)}
  75%{transform:translate(-50%,-100%) translate(-2px,.2px)}
}
#pet,.scene-pet{position:relative;left:auto;top:auto;transform:none;width:100%;height:100%;
  display:flex;align-items:flex-end;justify-content:center;
  cursor:pointer;user-select:none;-webkit-user-select:none;pointer-events:auto}
.pet-sprite{width:100%;height:100%;display:block;object-fit:contain;image-rendering:pixelated;
  filter:drop-shadow(0 5px 4px rgba(0,0,0,.3))}
/* tiger4.png — 4×4 單幀精靈（容器 = 1 格，background-size: 400% 400%） */
.tiger4-kitchen-stage,.tiger4-bedroom-stage{position:relative;width:100%;height:100%;
  display:flex;align-items:flex-end;justify-content:center}
.tiger-sprite-wrap{width:var(--t4-fw,256px);height:var(--t4-fh,256px);flex:none;
  transform:scale(var(--t4-scale,1));transform-origin:bottom center}
.tiger-sprite{width:var(--t4-fw,256px);height:var(--t4-fh,256px);flex:none;
  image-rendering:pixelated;-webkit-image-rendering:pixelated;
  background-image:var(--tiger4-sheet,none);background-repeat:no-repeat;
  background-size:400% 400%;background-position:0 0;
  filter:drop-shadow(0 5px 4px rgba(0,0,0,.3))}
.tiger-sprite.scene-tiger-walk{background-image:var(--tiger-sheet,none)}
.kitchen-food-slot{position:absolute;left:54%;top:46%;width:32%;height:22%;transform:translate(-50%,-50%);
  z-index:3;pointer-events:none;display:flex;align-items:center;justify-content:center;image-rendering:pixelated}
.kitchen-food-slot img,.kitchen-food-slot canvas{max-width:100%;max-height:100%;image-rendering:pixelated;
  filter:drop-shadow(0 2px 2px rgba(0,0,0,.25))}
.kitchen-food-slot:empty{display:none}
.food-icon,.kitchen-food-icon{display:block;flex:none;background-image:var(--food-sheet,none);background-repeat:no-repeat;
  background-size:400% 400%;image-rendering:pixelated;-webkit-image-rendering:pixelated;
  filter:drop-shadow(0 2px 2px rgba(0,0,0,.22))}
.food-icon{width:48px;height:48px}
.kitchen-food-slot .kitchen-food-icon{width:92%;height:92%}
.food-inv-overlay{position:absolute;inset:0;z-index:25;background:rgba(36,26,48,.88);display:none;align-items:center;
  justify-content:center;padding:16px;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
.food-inv-panel{background:#fff8ec;border:4px solid #2b2233;border-radius:14px;padding:14px 12px 12px;width:min(320px,92vw);
  box-shadow:0 8px 0 #2b2233,0 14px 28px rgba(30,20,55,.25)}
.food-inv-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px}
.food-inv-head h2{font-size:15px;font-weight:900;color:#3a2e4a;margin:0}
.food-inv-close{background:none;border:none;padding:0;margin:0;cursor:pointer;font:inherit;
  font-size:11px;font-weight:800;color:#5a4a6a}
.food-inv-close:hover{color:#3a2e4a}
.food-inv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.food-inv-item{display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 4px;background:#fff;
  border:2.5px solid #d8c9b0;border-radius:10px;cursor:pointer;box-shadow:0 3px 0 #d8c9b0}
.food-inv-item:active{transform:translateY(2px);box-shadow:0 1px 0 #d8c9b0}
.food-inv-name{font-size:9px;font-weight:800;color:#5a4a6a;line-height:1.15;text-align:center}
.food-inv-hint{font-size:11px;color:#9a8a7a;text-align:center;margin-top:10px;font-weight:700}
.food-inv-hint .money-ic{height:12px;vertical-align:-2px;margin:0 1px}
#foodInvFab{position:absolute;right:12px;bottom:var(--inv-fab-bottom,42%);z-index:7;
  background:none;border:none;padding:0;margin:0;line-height:0;cursor:pointer;
  -webkit-tap-highlight-color:transparent;filter:drop-shadow(0 2px 3px rgba(0,0,0,.3))}
#foodBagIc{width:48px;height:48px;object-fit:contain;image-rendering:pixelated;display:block}
#foodInvFab:active{transform:scale(.94)}
@keyframes bob{0%,100%{transform:translate(-50%,-100%)}50%{transform:translate(-50%,calc(-100% - 8px))}}
@keyframes shiver{0%,100%{transform:translate(-50%,-100%)}50%{transform:translate(-53%,-100%)}}
.petGlyph{font-size:66px;line-height:1;filter:drop-shadow(0 6px 0 rgba(0,0,0,.22));
  animation:breathe 1.9s ease-in-out infinite;transform-origin:50% 100%}
.petImg{max-width:100%;max-height:100%;image-rendering:pixelated;
  filter:drop-shadow(0 5px 4px rgba(0,0,0,.3));animation:breathe 1.9s ease-in-out infinite;transform-origin:50% 100%}
@keyframes breathe{0%,100%{transform:scale(1,1)}25%{transform:scale(.97,1.03) translateY(-2px)}
  50%{transform:scale(1.03,.97)}75%{transform:scale(.99,1.01) translateY(-1px)}}
.pet-stage-anchor.hop .petImg,.pet-stage-anchor.hop .petGlyph,#petAnchor.hop .petImg,#petAnchor.hop .petGlyph{animation:hop .5s ease}
@keyframes hop{0%{transform:translateY(0) scale(1,1)}30%{transform:translateY(-24px) scale(1.05,.95)}
  55%{transform:translateY(0) scale(1.07,.93)}75%{transform:translateY(-7px) scale(1,1)}100%{transform:translateY(0)}}
.petCrown{position:absolute;top:-4px;left:50%;transform:translateX(-50%);font-size:22px;z-index:3;filter:drop-shadow(0 2px 0 #0004)}
.petSick{position:absolute;top:8px;right:8px;font-size:16px;animation:breathe 1.2s infinite}
/* 對話框：寬度放寬，底部與寵物頭頂保持淨空（含箭頭與晃動緩衝） */
#speech{position:absolute;left:var(--px,50%);
  top:calc(var(--py,40%) - var(--pet-h) - var(--speech-gap) - var(--speech-arrow) - var(--speech-bob));
  bottom:auto;
  transform:translate(-50%,-100%);z-index:6;
  width:max-content;min-width:clamp(178px,43vw,210px);max-width:min(52vw,240px);
  background:rgba(255,255,255,.96);border:2px solid #000;border-radius:10px;padding:12px 14px;font-size:12px;font-weight:600;
  color:#33254a;box-shadow:0 3px 0 #0002;opacity:0;visibility:hidden;transition:opacity .25s;text-align:center;
  line-height:1.5;word-break:normal;overflow-wrap:break-word;white-space:normal;
  animation:speechFloat 3.3s ease-in-out infinite;-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);pointer-events:auto;box-sizing:border-box}
#speech.show{opacity:1;visibility:visible}
@keyframes speechFloat{0%,100%{transform:translate(-50%,-100%)}50%{transform:translate(-50%,calc(-100% - 2px))}}
#speech::after{content:"";position:absolute;left:50%;bottom:calc(-1 * var(--speech-arrow));transform:translateX(-50%);
  border:6px solid transparent;border-top-color:#000;border-bottom:none}
#speechX{position:absolute;top:-7px;right:-7px;width:15px;height:15px;border-radius:50%;
  background:#e05a5a;color:#fff;border:2px solid #000;font-size:8px;font-weight:900;line-height:1;
  display:grid;place-items:center;box-shadow:0 1px 0 #0004;cursor:pointer;padding:0}

/* 寵物狀態：輕量毛玻璃 */
/* 狀態卡：可收合（預設圓點，點開展開）*/
#petStats{position:absolute;left:8px;top:calc(var(--hud-h) + 12px);z-index:5}
.stats-dot{width:34px;height:34px;border-radius:50%;padding:0;cursor:pointer;font-size:16px;line-height:1;
  display:grid;place-items:center;color:#3a3548;
  background:rgba(255,255,255,.28);-webkit-backdrop-filter:blur(12px) saturate(1.2);backdrop-filter:blur(12px) saturate(1.2);
  border:1px solid rgba(255,255,255,.42);box-shadow:0 4px 12px rgba(30,20,55,.12)}
.stats-dot:active{transform:scale(.94)}
.stats-body{display:flex;flex-direction:column;gap:3px;min-width:118px;
  background:rgba(255,255,255,.22);-webkit-backdrop-filter:blur(12px) saturate(1.2);backdrop-filter:blur(12px) saturate(1.2);
  padding:7px 9px;border:1px solid rgba(255,255,255,.32);border-radius:12px;box-shadow:0 4px 14px rgba(30,20,55,.06)}
#petStats.collapsed .stats-body{display:none}
#petStats:not(.collapsed) .stats-dot{position:absolute;top:-7px;right:-7px;width:20px;height:20px;font-size:10px;z-index:2}
#petName{color:#3a3548;font-size:11px;font-weight:800;white-space:nowrap;
  padding-bottom:3px;margin-bottom:1px;border-bottom:1px solid rgba(58,53,72,.12)}
.pstat{display:flex;align-items:center;gap:6px;font-size:11px;color:#3e3a4a;font-weight:700;letter-spacing:.2px}
.pstat>span{flex:none;min-width:2.4em}
.pstat .bar{flex:1;min-width:48px;height:6px;background:rgba(58,53,72,.12);border-radius:4px;overflow:hidden}
.pstat .bar>i{display:block;height:100%;border-radius:4px}
#weatherTag{margin-top:3px;padding-top:3px;border-top:1px solid rgba(58,53,72,.10);
  color:#4a4560;font-size:10.5px;font-weight:800;line-height:1.3;text-align:left}
.led{display:inline-block;width:10px;height:10px;border-radius:50%;border:1.5px solid #000;
  background:var(--c);vertical-align:middle;margin-right:5px;image-rendering:pixelated;
  box-shadow:0 0 5px var(--c),inset 1.5px 1.5px 0 rgba(255,255,255,.65);animation:ledPulse 2s ease-in-out infinite}
@keyframes ledPulse{0%,100%{box-shadow:0 0 4px var(--c),inset 1.5px 1.5px 0 rgba(255,255,255,.65)}
  50%{box-shadow:0 0 10px var(--c),inset 1.5px 1.5px 0 rgba(255,255,255,.65)}}

/* ===== 分頁內容：毛玻璃 BottomSheet ===== */
#sheet{
  position:absolute; left:0; right:0; z-index:6;
  background:rgba(255,255,255,0.85);
  -webkit-backdrop-filter:blur(16px) saturate(1.2);
  backdrop-filter:blur(16px) saturate(1.2);
  border-radius:24px 24px 0 0;
  box-shadow:0 -10px 34px rgba(24,14,44,.22), inset 0 1px 0 rgba(255,255,255,.6);
  display:flex; flex-direction:column; overflow:hidden;
  transition:transform .3s cubic-bezier(0.25, 1, 0.5, 1);
  will-change:transform;
}
#sheet.dragging{transition:none}
#sheet.atTop{border-radius:0}
#sheetGrab{flex:none;touch-action:none;cursor:grab;user-select:none;-webkit-user-select:none}
#sheetGrab:active{cursor:grabbing}
#dragHandle{display:flex;justify-content:center;padding:10px 0 6px}
#dragHandle::before{content:"";width:44px;height:5px;border-radius:99px;background:rgba(70,50,95,.22)}
#sheetHead{display:flex;align-items:center;justify-content:space-between;padding:2px 18px 12px;background:transparent;border:none}
#sheet.sheet-home #sheetHead{padding:0 18px 6px}
.sheet-title{display:flex;align-items:center;gap:7px;min-width:0}
.sheet-title-ic{width:22px;height:22px;object-fit:contain;image-rendering:pixelated;flex:none}
#sheetHead b{font-size:16px;font-weight:900;letter-spacing:.3px;line-height:1}
.sheet-peek{padding:0 18px 10px;display:none}
.sheet-peek.show{display:block}
.peek-label{font-size:10.5px;color:#9A90A6;font-weight:700;margin-bottom:4px}
.peek-row{display:flex;align-items:center;gap:10px}
.peek-amt{font-size:18px;font-weight:800;white-space:nowrap;min-width:72px}
.peek-bar{flex:1;height:8px;background:rgba(120,100,150,.14);border-radius:99px;overflow:hidden}
.peek-bar>i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,#ffd463,#f5a623);transition:width .3s}
#app.parallax-drag #island{transition:none}
#sheetBody{overflow-y:auto;padding:4px 14px 16px;flex:1;touch-action:pan-y;-webkit-overflow-scrolling:touch}
#sheet.sheet-home #sheetBody{padding:2px 14px 14px}
#sheetBody::-webkit-scrollbar{width:8px}
#sheetBody::-webkit-scrollbar-thumb{background:#c9b8a0;border-radius:4px}

/* ===== 底部導覽 ===== */
#nav{z-index:7;display:flex;background:rgba(255,253,249,.85);
  -webkit-backdrop-filter:blur(16px) saturate(1.1);backdrop-filter:blur(16px) saturate(1.1);
  border-top:1px solid rgba(30,20,55,.06);box-shadow:0 -6px 20px rgba(30,20,55,.06)}
.tab{position:relative;flex:1;background:none;color:#9A90A6;padding:9px 2px 8px;font-size:11px;font-weight:800;
  display:flex;flex-direction:column;align-items:center;gap:3px;border-top:3px solid transparent}
.tab .em{width:26px;height:26px;object-fit:contain;image-rendering:pixelated;filter:grayscale(.4) brightness(.92);opacity:.72}
.tab.active{color:#C07A10;background:none;border-top-color:transparent}
.tab.active::before{content:"";position:absolute;left:12px;right:12px;top:4px;height:28px;background:rgba(245,166,35,.16);border-radius:12px;z-index:-1}
.tab.active .em{filter:none;opacity:1;transform:translateY(-1px)}

/* ===== 卡片/列表 ===== */
.card{background:rgba(255,255,255,.78);border:none;border-radius:18px;padding:13px;margin-bottom:11px;box-shadow:0 8px 20px rgba(30,20,55,.09)}
.row{display:flex;align-items:center;gap:9px}
.spread{display:flex;align-items:center;justify-content:space-between;gap:8px}
label.fld{display:block;font-size:12px;font-weight:800;margin:9px 0 4px;color:#5a4a6a}
input,select,textarea{width:100%;font-family:var(--font);font-size:15px;padding:9px;border:3px solid var(--line);
  border-radius:6px;background:#fffdf7;color:var(--ink);font-weight:600}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--coin);background:#fff}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:7px 10px;border:2px solid var(--line);border-radius:16px;background:#fff;font-size:12px;font-weight:800}
.chip.on{background:var(--gold);color:#4a3410}
.chip.exp{--c:#e05a5a} .chip.inc{--c:#3f9e4d}
.tx-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:2px dashed #e6dcc8}
.tx-item:last-child{border-bottom:none}
.tx-ic{width:38px;height:38px;flex:none;display:grid;place-items:center;font-size:19px;border-radius:8px;background:#f4ecdb;border:2px solid var(--line)}
.tx-main{flex:1;min-width:0}
.tx-main .t{font-weight:800;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-main .s{font-size:11px;color:#8a7a6a;margin-top:1px}
.tx-amt{font-weight:900;font-size:14px;white-space:nowrap}
.amt-exp{color:var(--bad)} .amt-inc{color:var(--good)}
.tag{display:inline-block;font-size:10px;font-weight:800;padding:1px 6px;border-radius:8px;background:#ffe08a;color:#7a5a10;border:1px solid #c99}
.badge{background:#e05a5a;color:#fff;border-radius:10px;font-size:10px;font-weight:800;padding:1px 6px}
.hint{font-size:11.5px;color:#8a7a6a;line-height:1.5}
.mini{font-size:11px;color:#9a8a7a}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.kpi{background:rgba(255,255,255,.72);border:none;border-radius:18px;padding:13px 10px;text-align:center;
  box-shadow:0 8px 20px rgba(30,20,55,.08)}
.kpi b{display:block;font-size:23px;font-weight:900;letter-spacing:.3px;line-height:1.1}
.kpi span{font-size:10.5px;color:#9a90a6;font-weight:700;margin-top:4px;display:block}
.barrow{margin:9px 0}
.barrow .lab{display:flex;justify-content:space-between;font-size:11.5px;font-weight:700;margin-bottom:5px;color:#8a7f97}
.barrow .track{height:12px;background:rgba(120,100,150,.16);border:none;border-radius:99px;overflow:hidden}
.barrow .track>i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,#ffd463,#f5a623)}
/* 首頁層級：英雄數字 + 次要 chip + 主/次按鈕 */
.hero-card{background:rgba(255,255,255,.82);border-radius:20px;padding:16px 16px 14px;box-shadow:0 10px 24px rgba(30,20,55,.09);margin-bottom:12px}
.hero-label{font-size:12px;color:#9A90A6;font-weight:700}
.hero-value{font-size:32px;font-weight:800;letter-spacing:.3px;line-height:1.05;margin:2px 0 11px}
.hbar{height:10px;background:rgba(120,100,150,.16);border-radius:99px;overflow:hidden}
.hbar>i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,#ffd463,#f5a623)}
.hero-cap{font-size:11.5px;color:#8a7f97;font-weight:600;margin-top:9px;display:flex;align-items:center;gap:6px}
.chips-row{display:flex;gap:8px;margin-bottom:12px}
.chip-stat{flex:1;background:rgba(255,255,255,.64);border-radius:14px;padding:10px 8px;text-align:center;box-shadow:0 4px 12px rgba(30,20,55,.06)}
.chip-stat b{display:block;font-size:15px;font-weight:800;line-height:1.1}
.chip-stat span{font-size:10px;color:#9A90A6;font-weight:700;margin-top:2px;display:block}
.btn.big{width:100%;height:48px;font-size:15px;border-radius:14px}
.btn.soft{background:transparent;border:2px solid rgba(43,34,51,.16);color:#5A4A6A;box-shadow:none;font-weight:800;display:flex;align-items:center;justify-content:center;gap:6px}
.soft-ic{width:20px;height:20px;object-fit:contain;image-rendering:pixelated}
.btn.soft:active{transform:translateY(1px);box-shadow:none}
.row.two{display:flex;gap:8px;margin-top:10px}
.row.two .btn{flex:1}

/* 首頁 Bottom Sheet */
.home-panel{display:flex;flex-direction:column;gap:0}
.home-panel .hero-card{margin-bottom:8px;padding:11px 14px 9px;border-radius:18px}
.home-panel .hero-value{margin:1px 0 7px;font-size:30px}
.home-panel .hero-cap{margin-top:6px}
.home-panel .chips-row{margin-bottom:8px;gap:6px}
.home-panel .chip-stat{padding:7px 6px;border-radius:12px}
.home-panel .chip-stat b{font-size:14px}
.home-panel .chip-stat span{font-size:9.5px;margin-top:1px}
.home-panel .btn.big{margin-bottom:7px;height:44px}
.home-panel .row.two{margin-top:7px;gap:7px}
.home-panel .row.two .btn{height:42px}
.home-recent{margin:12px 0 10px}
.home-recent-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;padding:0 2px}
.home-recent-head b{font-size:13px;font-weight:900;color:#2B2233}
.home-recent-head .link{font-size:11px;font-weight:800;color:#C07A10;background:none;border:none;padding:0;cursor:pointer}
.home-recent-list{background:rgba(255,255,255,.78);border-radius:16px;padding:4px 12px;box-shadow:0 6px 16px rgba(30,20,55,.07)}
.home-recent-list .tx-item{padding:8px 0}
.home-recent-list .tx-ic{width:34px;height:34px;font-size:17px}
.home-recent-list .tx-main .t{font-size:13px}
.home-recent-list .tx-main .s{font-size:10.5px}
.home-panel .disclaimer{margin-top:10px;margin-bottom:2px}
.home-panel .disclaimer.home-foot{margin-top:14px}
.period-seg{display:flex;background:rgba(120,100,150,.10);border-radius:12px;padding:3px;margin-bottom:9px;gap:2px}
.period-seg button{flex:1;border:none;background:transparent;color:#9A90A6;font-size:12px;font-weight:800;padding:7px 4px;border-radius:10px;cursor:pointer;transition:background .2s,color .2s,box-shadow .2s}
.period-seg button.on{background:#fff;color:#2B2233;box-shadow:0 2px 8px rgba(30,20,55,.10)}
.home-group{padding:8px 0;border-bottom:1px dashed rgba(120,100,150,.14)}
.home-group:last-child{border-bottom:none}
.home-group-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:2px 2px 6px;font-size:12.5px;font-weight:900;color:#2B2233}
.home-group-sum{font-size:12px;font-weight:900;white-space:nowrap}
.home-group-items{padding-left:8px}
.home-group-items .tx-item{padding:6px 0;border-bottom:1px dashed rgba(200,190,170,.35)}
.home-group-items .tx-item:last-child{border-bottom:none}
.home-group-items .tx-ic{width:30px;height:30px;font-size:15px;border-radius:7px}
.home-group-items .tx-main .t{font-size:12.5px}
.home-group-items .tx-main .s{font-size:10px}
.home-group-items .tx-amt{font-size:13px}

/* 兵種 */
.unit-card{border:3px solid var(--line);border-radius:8px;padding:9px;background:#fff;box-shadow:0 3px 0 #d8c9b0}
.unit-card.on{outline:3px solid var(--coin);background:#fff6df}
.unit-card .u-em{font-size:26px;min-height:48px;display:flex;align-items:center;justify-content:center}
.unit-card .u-nm{font-weight:900;font-size:13px;margin-top:2px}
.unit-card .u-ds{font-size:10.5px;color:#7a6a5a;line-height:1.4;margin-top:3px}
.war-ic{width:42px;height:48px;object-fit:contain;image-rendering:pixelated}
.war-ic.sm{width:22px;height:24px;vertical-align:-4px;display:inline-block}
.army-item{display:flex;align-items:center;gap:9px;padding:9px;border:3px solid var(--line);border-radius:8px;margin-bottom:8px;background:#fff}
.army-item .a-em{font-size:24px;min-width:36px;display:flex;align-items:center;justify-content:center}
.army-item .war-ic{width:32px;height:36px}

/* ===== 覆蓋層/測驗 ===== */
.overlay{position:absolute;inset:0;z-index:20;background:#241a30f2;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:22px;text-align:center;color:#fff}
.overlay h1{font-size:22px;margin-bottom:6px;color:#ffd873;text-shadow:2px 2px 0 #000}
.overlay p{font-size:13px;color:#d8cbe8;line-height:1.6;max-width:340px}
.qbox{background:var(--panel);color:var(--ink);border:4px solid #000;border-radius:12px;padding:16px;
  width:100%;max-width:360px;box-shadow:0 6px 0 #000}
.qbox .qn{font-size:12px;font-weight:800;color:var(--coin)}
.qbox .qt{font-size:16px;font-weight:900;margin:6px 0 12px;line-height:1.4}
.opt{display:block;width:100%;text-align:left;background:#fff;border:3px solid var(--line);border-radius:8px;
  padding:11px;margin-bottom:8px;font-size:13.5px;font-weight:700;box-shadow:0 3px 0 #d8c9b0}
.opt:active{transform:translateY(2px);box-shadow:0 1px 0 #d8c9b0}
.dots{display:flex;gap:6px;justify-content:center;margin-top:6px}
.dots i{width:8px;height:8px;border-radius:50%;background:#5a4a6a}
.dots i.on{background:var(--gold)}
.bday-row{display:flex;align-items:center;justify-content:center;gap:5px;margin-top:6px;flex-wrap:nowrap}
.bday-sel{font-size:15px;padding:9px 4px;border:3px solid var(--line);border-radius:8px;background:#fffdf7;color:var(--ink);font-weight:700;min-width:0}
.bday-sel:first-child{flex:1.4} .bday-row span{font-weight:800;color:#5a4a6a;font-size:13px;flex:none}
.egg{font-size:80px;animation:eggBob 2s ease-in-out infinite}
@keyframes eggBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes pop{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
.pop{animation:pop .5s}
.toast{position:absolute;left:50%;bottom:calc(38% + 72px);transform:translateX(-50%);z-index:30;
  background:#1e1729;color:#fff;border:3px solid #000;border-radius:10px;padding:9px 14px;font-weight:800;font-size:13px;
  opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 0 #0006}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-8px)}
.center{text-align:center}
.mt{margin-top:10px}
.disclaimer{font-size:10px;color:#9a8a7a;line-height:1.5;margin-top:8px;padding:8px;background:#f4ecdb;border-radius:6px;border:2px dashed #c9b8a0}
.split{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.seg{display:flex;border:3px solid var(--line);border-radius:8px;overflow:hidden}
.seg button{flex:1;padding:9px;background:#fff;font-weight:800;font-size:13px}
.seg button.on{background:var(--gold);color:#4a3410}

/* ===== 聊天室 ===== */
.chatWrap{width:100%;max-width:380px;height:82vh;max-height:640px;background:var(--panel);color:var(--ink);
  border:4px solid #000;border-radius:18px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 8px 0 #000}
.chatHead{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:10px 12px;
  background:linear-gradient(#3a2e4a,#2b2233);border-bottom:3px solid #000}
.chatHead .who{display:flex;align-items:center;gap:9px;color:#fff}
.chatHead .av{width:38px;height:38px;border-radius:50%;background:#fff2;display:grid;place-items:center;overflow:hidden;border:2px solid #000}
.chatHead .av img{width:34px;height:34px;image-rendering:pixelated;object-fit:contain}
.chatHead .nm{font-weight:900;font-size:14px;line-height:1.1}
.chatHead .sub{font-size:10px;color:#cbb9e6}
.chatX{background:#1e1729;border:2px solid #000;border-radius:8px;color:#fff;width:30px;height:30px;font-size:15px}
.chatBody{flex:1;overflow-y:auto;padding:14px 12px;display:flex;flex-direction:column;gap:9px;background:linear-gradient(#eef4ff,#fff8ec)}
.bub{max-width:80%;padding:9px 12px;font-size:13.5px;font-weight:600;line-height:1.45;border:2px solid #000;box-shadow:0 3px 0 #0002}
.bub.pet{align-self:flex-start;background:#fff;border-radius:4px 16px 16px 16px}
.bub.me{align-self:flex-end;background:var(--gold);color:#4a3410;border-radius:16px 4px 16px 16px}
.bub.sys{align-self:center;max-width:92%;text-align:center;background:#e7f7e8;color:#2a7a3a;
  border:2px dashed #7cc98a;border-radius:12px;font-size:12px;font-weight:800;box-shadow:none;padding:7px 12px}
.bub.typing{color:#9a8a7a;font-weight:700}
.bub.typing i{animation:blink 1s infinite}.bub.typing i:nth-child(2){animation-delay:.2s}.bub.typing i:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:1}}
.chatIn{display:flex;gap:8px;padding:10px;border-top:3px solid #000;background:var(--panel2)}
.chatIn input{flex:1;border-radius:20px;border:3px solid var(--line)}
.chatSend{background:var(--gold);border:3px solid var(--line);border-radius:50%;width:44px;height:44px;flex:none;font-size:18px;font-weight:900;box-shadow:0 3px 0 var(--wood2)}
</style>
</head>
<body>
<div id="app">

  <!-- HUD -->
  <div id="hud">
    <div class="stat-pill"><img class="ic coin" id="coinIc" alt=""><span id="coinTxt">0</span></div>
    <div class="stat-pill"><img class="ic gem" id="gemIc" alt=""><span id="gemTxt">0</span></div>
    <div id="lvlWrap">
      <div class="lv"><span id="lvTxt">Lv.1</span><span id="xpTxt">0/100</span></div>
      <div class="xpbar"><i id="xpFill"></i></div>
    </div>
    <button id="gear" type="button" title="設定" aria-label="設定">
      <span class="gear-glow" aria-hidden="true"></span>
      <svg class="gear-icon" viewBox="0 0 24 24" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
        <!-- iOS 風多齒輪：深色像素勾邊 -->
        <g fill="#2B2233">
          <rect x="10" y="0" width="4" height="2"/><rect x="9" y="2" width="6" height="1"/>
          <rect x="10" y="22" width="4" height="2"/><rect x="9" y="21" width="6" height="1"/>
          <rect x="0" y="10" width="2" height="4"/><rect x="2" y="9" width="1" height="6"/>
          <rect x="22" y="10" width="2" height="4"/><rect x="21" y="9" width="1" height="6"/>
          <rect x="3" y="3" width="3" height="2"/><rect x="5" y="5" width="2" height="2"/><rect x="2" y="5" width="2" height="2"/>
          <rect x="18" y="3" width="3" height="2"/><rect x="17" y="5" width="2" height="2"/><rect x="20" y="5" width="2" height="2"/>
          <rect x="3" y="19" width="3" height="2"/><rect x="5" y="17" width="2" height="2"/><rect x="2" y="17" width="2" height="2"/>
          <rect x="18" y="19" width="3" height="2"/><rect x="17" y="17" width="2" height="2"/><rect x="20" y="17" width="2" height="2"/>
          <rect x="5" y="5" width="14" height="14"/>
        </g>
        <!-- 齒輪主體：淡金黃 -->
        <g fill="#FFD166">
          <rect x="10" y="1" width="4" height="1"/><rect x="9" y="2" width="6" height="1"/>
          <rect x="10" y="22" width="4" height="1"/><rect x="9" y="21" width="6" height="1"/>
          <rect x="1" y="10" width="1" height="4"/><rect x="2" y="9" width="1" height="6"/>
          <rect x="22" y="10" width="1" height="4"/><rect x="21" y="9" width="1" height="6"/>
          <rect x="4" y="4" width="2" height="1"/><rect x="6" y="6" width="1" height="1"/><rect x="3" y="6" width="1" height="1"/>
          <rect x="18" y="4" width="2" height="1"/><rect x="17" y="6" width="1" height="1"/><rect x="20" y="6" width="1" height="1"/>
          <rect x="4" y="19" width="2" height="1"/><rect x="6" y="17" width="1" height="1"/><rect x="3" y="17" width="1" height="1"/>
          <rect x="18" y="19" width="2" height="1"/><rect x="17" y="17" width="1" height="1"/><rect x="20" y="17" width="1" height="1"/>

function schedulePetBehavior(){
  if(petAnim.control==='user')return;
  const cd=PET_MOVE.behaviorCooldown;

  if(isMoodSevere())delay=7000+Math.random()*9000;
  else if(isMoodGlum())delay=cd[0]+Math.random()*(cd[1]-cd[0]);
  else delay=cd[0]+Math.random()*(cd[1]-cd[0]);
  petAnim.behaviorAt=performance.now()+delay;

function pickRandomBehavior(){
  if(petAnim.control==='user')return;
  if(petAnim.state!=='idle')return;
  const ts=performance.now();
  if(petAnim.idleUntil&&ts<petAnim.idleUntil)return;
  const severe=isMoodSevere(),glum=isMoodGlum(),r=Math.random();
  if(severe){if(r<0.28)beginPetWalk();else enterIdleBehavior('mood',1200+Math.random()*1800);return;}
  if(glum){if(r<0.42)beginPetWalk();else enterIdleBehavior('mood',1500+Math.random()*2000);return;}
  if(r<0.40)beginPetWalk();
  else if(r<0.58){petAnim.frame=TIGER_SPR.IDX.idle;schedulePetBehavior();}
  else if(r<0.72)enterIdleBehavior('sit',2000+Math.random()*2500);
  else if(r<0.84)triggerPetAction(Math.random()<0.5?'wave':'cheer');

function beginPetPath(waypoints,opts){

  const first=petAnim.pathQueue[0];
  petAnim.targetPx=first.px;petAnim.targetPy=first.py;
  if(opts&&opts.user)petAnim.control='user';
  petAnim.runMode=false;petAnim.runWalkMs=TIGER_SPR.WALK_MS;

function finishPetWalk(ts,comfortable,severe,I){
  petAnim.px=petAnim.targetPx;
  if(petAnim.targetPy!=null)petAnim.py=petAnim.targetPy;
  if(!onStairsPath(petAnim.px,petAnim.py)){
    const c=clampToNav(petAnim.px,petAnim.py);
    petAnim.px=c.px;petAnim.py=c.py;petAnim.platform=c.platform;
  }else if(petAnim.py<NAV.ground.pyMin-5)petAnim.platform='upper';
  setPetPos(petAnim.px,petAnim.py);
  petAnim.runMode=false;petAnim.targetPy=null;
  if(petAnim.pathQueue&&petAnim.pathQueue.length>1){
    petAnim.pathQueue.shift();
    const n=petAnim.pathQueue[0];
    petAnim.targetPx=n.px;petAnim.targetPy=n.py;petAnim.state='walk';
    return;
  }
  petAnim.pathQueue=null;
  if(typeof tryEatHomeObject==='function')tryEatHomeObject(); // 走到物件旁 → 吃掉（陪玩）
  if(petAnim.pendingJumpUpper&&!petAnim.arrivePanic){
    const j=petAnim.pendingJumpUpper;
    startJumpToUpper(j.landPx,j.landPy);
    return;
  }
  if(petAnim.panicRecover){
    petAnim.panicRecover=false;petAnim.state='idle';petAnim.control='auto';
    schedulePetBehavior();
    petAnim.frame=comfortable?I.idle:moodIdleFrame(ts);
    petAnim.stillSince=performance.now();

  }
  if(petAnim.arrivePanic){
    startPanicAtEdge();
    return;
  }
  petAnim.state='idle';

  if(wasUser)petAnim.control='auto';

  petAnim.frame=comfortable?I.idle:moodIdleFrame(ts);

function commandPetMoveTo(px,py){
  if(S.pet.stage<2)return;

  const wasSleep=wakeFromSleep();
  cancelPanic();
  petAnim.arrivePanic=false;petAnim.panicRecover=false;petAnim.pathQueue=null;
  petAnim.pendingJumpUpper=null;petAnim.idleUntil=0;
  if(petAnim.state==='jump'){petAnim.pendingMove={px,py};return;}
  if(petAnim.state==='action')petAnim.state='idle';
  touchPetActivity();
  const upper=isHomeScene()&&isUpperRegion(px,py);
  if(upper&&!isOnUpperPlatform()){                 // 島內、上層區 → 跳上去（僅首頁）
    commandJumpToUpper(px,py);

    return;
  }
  if(isHomeScene()&&!upper&&isOnUpperPlatform()){   // 在上層、點下層 → 跳下來
    commandJumpToGround(px,py);

  }
  const tier=isOnUpperPlatform()?'upper':'ground'; // 同層：走到最近草地（點岩石也不恐慌）
  const goal=clampToNav(px,py,tier);

function updateScenePetWalk(dt,scene){
  const sp=scenePet[scene];if(!sp||sp.state!=='walk')return false;
  const dx=sp.tx-sp.px,dy=sp.ty-sp.py,dist=Math.hypot(dx,dy);
  if(dist<PET_MOVE.arriveDist){
    sp.px=sp.tx;sp.py=sp.ty;sp.state='idle';
    setScenePetPos(scene,sp.px,sp.py);
    return false;
  }
  const step=PET_MOVE.userSpd*dt,ratio=Math.min(1,step/dist);
  sp.px+=dx*ratio;sp.py+=dy*ratio;
  if(Math.abs(dx)>0.15)sp.flip=dx>=0?1:-1;
  sp.walkAccum+=dt;
  while(sp.walkAccum>=TIGER_SPR.WALK_MS){
    sp.walkAccum-=TIGER_SPR.WALK_MS;
    sp.walkIdx=(sp.walkIdx+1)%TIGER_SPR.IDX.walk.length;
  }
  setScenePetPos(scene,sp.px,sp.py);
  return true;
}

function chromaTigerSheet(img){
  const c=document.createElement('canvas');c.width=img.width;c.height=img.height;
  const ctx=c.getContext('2d',{willReadFrequently:true});ctx.drawImage(img,0,0);
  const id=ctx.getImageData(0,0,c.width,c.height),d=id.data;
  for(let i=0;i<d.length;i+=4){
    const r=d[i],g=d[i+1],b=d[i+2];
    if(r>175&&g<125&&b>175&&r-g>55) d[i+3]=0; // #FF00FF 洋紅去背
  }
  ctx.putImageData(id,0,0);return c;
}

    [typeof TIGER3_SPRITE_SRC!=='undefined'?TIGER3_SPRITE_SRC:'ui source/pets animation/tiger3.png','sheet3']

      allPetCanvases().forEach(c=>drawPetFrame(c,petAnim.frame,petAnim.flip));

  }
  jobs.forEach(([src,key])=>{

function finishKitchenEating(){

}
function foodFrameSize(){
  const s=foodAnim.sheet,cols=FOOD_SPR.COLS;
  if(!s)return{fw:256,fh:256};
  return{fw:s.width/cols,fh:s.height/cols};
}
function foodBgPos(x,y){
  // 用百分比定位，與 background-size:400% 相容（免管顯示尺寸）
  const cols=FOOD_SPR.COLS, rows=Math.ceil(FOOD_SPR.ITEMS.length/cols);
  return `${cols>1?(x/(cols-1)*100):0}% ${rows>1?(y/(rows-1)*100):0}%`;
}
function foodItemById(id){return FOOD_SPR.ITEMS.find(f=>f.id===id);}
function foodIconHtml(item,cls='food-icon'){
  if(!item)return'';
  return `<span class="${cls}" style="background-position:${foodBgPos(item.x,item.y)}" title="${item.nameZh}"></span>`;
}
function foodOverlayHtml(item){return foodIconHtml(item,'kitchen-food-icon');}
function applyFoodSheetCss(){
  if(!foodAnim.sheet)return;
  document.documentElement.style.setProperty('--food-sheet',`url("${foodAnim.sheet.toDataURL('image/png')}")`);
  const{fw,fh}=foodFrameSize();
  document.documentElement.style.setProperty('--food-fw',fw+'px');
  document.documentElement.style.setProperty('--food-fh',fh+'px');
  const k=tiger4Anim.kitchen;
  if(k.state==='eating'&&k.foodItem)Tiger4Scene.setFood(foodOverlayHtml(k.foodItem));
  if($('#foodInv')?.style.display!=='none')renderFoodInventory();
}
function loadFoodSheet(){
  if(foodAnim.ready||foodAnim.loading)return;
  foodAnim.loading=true;
  const img=new Image();
  img.onload=()=>{
    // food_clean.png 已是透明去背圖，直接轉 canvas（不再執行時去背，避免吃掉黑色描邊）
    const c=document.createElement('canvas');
    c.width=img.naturalWidth||img.width; c.height=img.naturalHeight||img.height;
    c.getContext('2d').drawImage(img,0,0);
    foodAnim.sheet=c;
    foodAnim.ready=true;foodAnim.loading=false;
    applyFoodSheetCss();
  };
  img.onerror=()=>{foodAnim.loading=false;console.warn('食物精靈圖載入失敗:',FOOD_SPR.SRC);};
  img.src=encodeURI(FOOD_SPR.SRC);
}
function renderFoodInventory(){
  const grid=$('#foodInvGrid');if(!grid)return;
  grid.innerHTML=FOOD_SPR.ITEMS.map(it=>`
    <button type="button" class="food-inv-item" data-food-id="${it.id}" onclick="pickFoodFromInventory('${it.id}')">
      ${foodIconHtml(it)}
      <span class="food-inv-name">${it.nameZh}</span>
    </button>`).join('');
}
function foodInvHintHtml(){
  return `點選食物餵食 · −${FOOD_SPR.FEED_COST}${coinIc(true)}金幣 · +飽食`;
}
function syncFoodInvHint(){
  const hint=$('#foodInvHint');
  if(hint)hint.innerHTML=foodInvHintHtml();
}
let foodInvOpen=false;
function toggleFoodInventory(){
  if(foodInvOpen)closeFoodInventory();
  else openFoodInventory();
}
function openFoodInventory(){
  if(S.pet.stage<2){toast('寵物尚未孵化');return;}
  loadFoodSheet();
  renderFoodInventory();
  syncFoodInvHint();
  const el=$('#foodInv');
  if(!el)return;
  el.style.display='flex';
  el.setAttribute('aria-hidden','false');
  foodInvOpen=true;
}
function closeFoodInventory(){
  const el=$('#foodInv');
  if(!el)return;
  el.style.display='none';
  el.setAttribute('aria-hidden','true');
  foodInvOpen=false;
}
function pickFoodFromInventory(id){
  const item=foodItemById(id);
  if(!item)return;
  if(S.wallet.coins<FOOD_SPR.FEED_COST){toast(`代幣不足（需${FOOD_SPR.FEED_COST}${coinIc(true)}）`);return;}
  closeFoodInventory();
  S.wallet.coins-=FOOD_SPR.FEED_COST;
  S.pet.hunger=clamp(S.pet.hunger+FOOD_SPR.HUNGER_GAIN);
  if(isTigerSprite())startKitchenEating(item);
  toast(`飽食 +${FOOD_SPR.HUNGER_GAIN} ${item.nameZh}`);
  sayPetLine(null,LINES.happy);
  renderAll();
}
function startKitchenEating(foodItem){
  const k=tiger4Anim.kitchen;
  k.state='eating';k.eatIdx=0;k.eatAccum=0;k.eatElapsed=0;k.foodItem=foodItem||null;
  if(scenePet.kitchen)scenePet.kitchen.state='idle';
  loadFoodSheet();
  Tiger4Scene.setFood(foodItem?foodOverlayHtml(foodItem):'');
}
function loadTiger4Sheet(){
  if(tiger4Anim.ready||tiger4Anim.loading)return;
  tiger4Anim.loading=true;
  const src=typeof TIGER4_SPRITE_SRC!=='undefined'?TIGER4_SPRITE_SRC:'ui source/pets animation/tiger4.png';
  const img=new Image();
  img.onload=()=>{
    tiger4Anim.sheet=chromaTigerSheet(img);
    tiger4Anim.ready=true;tiger4Anim.loading=false;
    applyTiger4SheetCss();
  };
  img.onerror=()=>{tiger4Anim.loading=false;console.warn('tiger4 載入失敗:',src);};
  img.src=encodeURI(src);
}
function tickTiger4Kitchen(dt){
  const k=tiger4Anim.kitchen,T=TIGER4_SPR;
  if(scenePet.kitchen.state==='walk')return T.REST_IDLE;
  if(k.state==='eating'){
    k.eatElapsed+=dt;
    k.eatAccum+=dt;
    while(k.eatAccum>=T.EAT_MS){
      k.eatAccum-=T.EAT_MS;
      k.eatIdx=(k.eatIdx+1)%T.IDX.eat.length;
    }
    if(k.eatElapsed>=T.EAT_DURATION_MS){
      finishKitchenEating();
      return T.REST_IDLE;
    }
    return T.IDX.eat[k.eatIdx];
  }
  const seq=T.IDLE_SEQ;
  k.accum+=dt;
  const step=seq[k.seqIdx];
  if(k.accum>=step.ms){
    k.accum-=step.ms;
    k.seqIdx=(k.seqIdx+1)%seq.length;
  }
  return seq[k.seqIdx].f;
}
function drawPetFrame(canvas,idx,flip,sheetKey){
  let key=sheetKey;
  if(!key){
    if(isPanicking()||isSleeping())key='tiger3';
    else if(petAnim.state==='jump'||!isMoodComfortable())key='tiger2';
    else key='tiger';
  }
  const sheet=key==='tiger3'?petAnim.sheet3:key==='tiger2'?petAnim.sheet2:petAnim.sheet;
  if(!canvas||!sheet)return;
  const cols=TIGER_SPR.COLS,ctx=canvas.getContext('2d');
  const fw=sheet.width/cols,fh=sheet.height/cols;
  const col=idx%cols,row=(idx/cols)|0,w=canvas.width,h=canvas.height;
  ctx.clearRect(0,0,w,h);
  ctx.save();
  if(flip<0){ctx.translate(w,0);ctx.scale(-1,1);}
  ctx.drawImage(sheet,col*fw,row*fh,fw,fh,0,0,w,h);
  ctx.restore();
}
function tickTiger4Bedroom(dt){
  const b=tiger4Anim.bedroom,T=TIGER4_SPR;
  if(scenePet.bedroom.state==='walk')return b.frame||T.REST_IDLE;
  if(b.state==='sleep'){
    b.sleepAccum+=dt;
    while(b.sleepAccum>=T.SLEEP_MS){
      b.sleepAccum-=T.SLEEP_MS;
      b.sleepIdx=(b.sleepIdx+1)%T.IDX.sleep.length;
    }
    return T.IDX.sleep[b.sleepIdx];
  }
  const seq=T.IDLE_SEQ;
  b.accum+=dt;
  const step=seq[b.seqIdx];
  if(b.accum>=step.ms){
    b.accum-=step.ms;
    b.seqIdx=(b.seqIdx+1)%seq.length;
  }
  return seq[b.seqIdx].f;
}
function updateTiger4SceneSprites(dt){
  if(!tiger4Anim.ready||!isTigerSprite())return;
  updateScenePetWalk(dt,'kitchen');
  updateScenePetWalk(dt,'bedroom');
  const kitchen=$('#kitchenTiger4Sprite'),bedroom=$('#bedroomTiger4Sprite');
  const spK=scenePet.kitchen,spB=scenePet.bedroom;
  if(kitchen){
    if(spK.state==='walk'&&petAnim.sheetsReady)setSceneSpriteWalk(kitchen,TIGER_SPR.IDX.walk[spK.walkIdx],spK.flip);
    else setSceneSpriteTiger4(kitchen,tickTiger4Kitchen(dt),spK.flip);
  }
  if(bedroom){
    if(spB.state==='walk'&&petAnim.sheetsReady)setSceneSpriteWalk(bedroom,TIGER_SPR.IDX.walk[spB.walkIdx],spB.flip);
    else{
      tiger4Anim.bedroom.frame=tickTiger4Bedroom(dt);
      setSceneSpriteTiger4(bedroom,tiger4Anim.bedroom.frame,spB.flip);
    }
  }
}

const Tiger4Scene={
  go(name){
    if(typeof SceneCarousel!=='undefined')SceneCarousel.go(name);
    if(name==='kitchen')resetKitchenIdle();
  },
  setBedroomState(state){
    if(state!=='sleep'&&state!=='awake')return;
    tiger4Anim.bedroom.state=state;
    tiger4Anim.bedroom.seqIdx=0;tiger4Anim.bedroom.accum=0;
    tiger4Anim.bedroom.sleepIdx=0;tiger4Anim.bedroom.sleepAccum=0;

};
window.addEventListener('resize',()=>{if(tiger4Anim.ready)layoutTiger4Sprites();});
window.Tiger4Scene=Tiger4Scene;
function jumpArcPos(idx,dir){
  const from=petAnim.jumpFrom,to=petAnim.jumpTo;
  const g=TIGER2_SPR.PLATFORM;
  if(!from||!to)return{px:petAnim.px,py:petAnim.py};
  const smooth=t=>t*t*(3-2*t);
  if(petAnim.jumpFail&&dir>0){
    const peak={px:Math.min(from.px+6,79),py:g.upper.landPy+7};
    const land={px:clamp(from.px-1,g.ground.pxMin,g.ground.pxMax),py:g.ground.py};
    if(idx<=4){
      const e=smooth(idx/4);
      return{px:from.px+(peak.px-from.px)*e,py:from.py+(peak.py-from.py)*e};
    }
    const e=smooth((idx-4)/3);
    return{px:peak.px+(land.px-peak.px)*e,py:peak.py+(land.py-peak.py)*e};
  }
  let t=0;
  if(dir>0){if(idx<=1)t=0;else if(idx>=7)t=1;else t=(idx-1)/6;}
  else{if(idx>=7)t=0;else if(idx<=0)t=1;else t=1-(idx/7);}
  const e=smooth(t);
  return{px:from.px+(to.px-from.px)*e,py:from.py+(to.py-from.py)*e};
}
function startJump(dir,landOverride,userCmd){
  const g=TIGER2_SPR.PLATFORM,u=g.upper;
  if(dir>0){
    petAnim.jumpFail=userCmd?false:(landOverride?false:Math.random()<0.05);
    petAnim.jumpFrom={px:petAnim.px,py:groundSurfaceY(petAnim.px)};
    if(landOverride)petAnim.jumpTo={px:landOverride.px,py:landOverride.py};
    else{
      const landPx=clamp(u.landPx+(Math.random()*3-1.5),u.pxMin,u.pxMax);
      petAnim.jumpTo={px:landPx,py:upperSurfaceY(landPx)};
    }
    petAnim.jumpIdx=0;petAnim.jumpDir=1;
  }else{
    petAnim.jumpFail=false;
    petAnim.jumpFrom={px:petAnim.px,py:upperSurfaceY(petAnim.px)};
    petAnim.jumpTo={px:58+Math.random()*8,py:g.ground.py};
    petAnim.jumpIdx=7;petAnim.jumpDir=-1;
  }
  petAnim.jumpAccum=0;petAnim.state='jump';
}
function beginPetWalk(){
  if(isOnUpperPlatform()){
    const u=NAV.upper,m=1.8;
    let target=u.pxMin+m+Math.random()*(u.pxMax-u.pxMin-m*2);
    if(Math.abs(target-petAnim.px)<2)target=petAnim.px>=((u.pxMin+u.pxMax)/2)?u.pxMin+m:u.pxMax-m;
    beginPetPath([{px:target,py:upperSurfaceY(target)}]);
    return;
  }
  const g=NAV.ground,m=1.8;
  let target=g.pxMin+m+Math.random()*(g.pxMax-g.pxMin-m*2);
  if(Math.abs(target-petAnim.px)<2){
    const mid=(g.pxMin+g.pxMax)/2;
    target=petAnim.px>=mid?g.pxMin+m:g.pxMax-m;
  }
  beginPetPath([{px:target,py:groundSurfaceY(target)}]);
}
function tryJumpUp(){/* 暫停高台跳躍 */}
function updatePetOverlays(pet){
  if(!pet)return;
  pet.querySelectorAll('.petCrown,.petSick,.petTear').forEach(e=>e.remove());
  const p=S.pet;
  if(p.stage>=4){const c=document.createElement('span');c.className='petCrown';c.textContent='👑';pet.appendChild(c);}
  if(p.health<25){const s=document.createElement('span');s.className='petSick';s.textContent='💦';pet.appendChild(s);}
  if(isMoodSevere()){const t=document.createElement('span');t.className='petTear';t.textContent='😢';pet.appendChild(t);}
}
function setupPetDisplay(){
  const p=S.pet,hosts=petHostEls().filter(h=>h.pet&&h.anchor);
  if(!hosts.length)return;
  if(p.stage<2||!isTigerSprite()){
    stopPetAnimator();
    hosts.forEach(({pet,anchor})=>{
      anchor.classList.remove('pet-sprite-active');
      pet.innerHTML=petInner();
    });
    setPetPos(50,groundSurfaceY(50));
    if(p.stage>=2)startPetLoop();
    return;
  }
  hosts.forEach(({pet,anchor,main})=>{
    if(!pet||!anchor)return;
    anchor.classList.add('pet-sprite-active');
    if(main){
      if(!pet.querySelector('#petCanvas')){
        const c=document.createElement('canvas');
        c.className='pet-sprite';c.id='petCanvas';c.width=256;c.height=256;
        pet.innerHTML='';pet.appendChild(c);
      }
      updatePetOverlays(pet);
    }else if(pet.id==='petKitchen'){
      mountTiger4Kitchen();
      pet.querySelectorAll('.petCrown,.petSick,.petTear').forEach(e=>e.remove());
    }else if(pet.id==='petBedroom'){
      mountTiger4Bedroom();
      pet.querySelectorAll('.petCrown,.petSick,.petTear').forEach(e=>e.remove());
    }
  });
  setPetPos(petAnim.px,petAnim.py);
  loadTigerSheets();
  loadTiger4Sheet();
  loadFoodSheet();
  initScenePets();
  startPetLoop();
  syncPetMoodState();
  if(petAnim.sheetsReady)allPetCanvases().forEach(c=>drawPetFrame(c,petAnim.frame,petAnim.flip));
  if(tiger4Anim.ready)layoutTiger4Sprites();
}
function triggerPetAction(kind){
  if(!isTigerSprite()||!petAnim.sheetsReady||!isMoodComfortable())return;
  wakeFromSleep();cancelPanic();touchPetActivity();
  const I=TIGER_SPR.IDX;
  petAnim.state='action';
  petAnim.frame=kind==='pounce'?I.pounce:kind==='wave'?I.wave:kind==='cheer'?I.cheer:(Math.random()<.5?I.cheer:I.pounce);
  petAnim.actionUntil=performance.now()+(kind==='pounce'?720:880);
}
function stopPetAnimator(){if(petAnim.raf){cancelAnimationFrame(petAnim.raf);petAnim.raf=0;}}
function startPetLoop(){
  if(petAnim.raf)return;
  petAnim.lastTs=performance.now();
  petAnim.stillSince=petAnim.lastTs;
  petAnim.lastUserAt=petAnim.lastTs;
  petAnim.nextBlinkAt=petAnim.lastTs+2200+Math.random()*3000;
  schedulePetBehavior();
  petAnim.raf=requestAnimationFrame(petLoop);
}
function petLoop(ts){
  if(S.pet.stage<2){stopPetAnimator();return;}
  const dt=Math.min(48,ts-(petAnim.lastTs||ts));petAnim.lastTs=ts;
  const I=TIGER_SPR.IDX,J=TIGER2_SPR.IDX,canvas=$('#petCanvas');
  const severe=isMoodSevere(),glum=isMoodGlum(),comfortable=isMoodComfortable();
  if(isTigerSprite())syncPetMoodState(ts);
  if(isTigerSprite()&&!petAnim.sheetsReady){petAnim.raf=requestAnimationFrame(petLoop);return;}
  let sheetKey='tiger';
  if(petAnim.state==='jump'){
    petAnim.jumpAccum+=dt;
    while(petAnim.jumpAccum>=TIGER2_SPR.JUMP_MS){
      petAnim.jumpAccum-=TIGER2_SPR.JUMP_MS;
      if(petAnim.jumpDir>0){
        petAnim.jumpIdx++;
        if(petAnim.jumpIdx>7){
          if(petAnim.jumpFail){
            petAnim.state='idle';petAnim.platform='ground';
            petAnim.px=clamp(petAnim.jumpFrom.px,TIGER2_SPR.PLATFORM.ground.pxMin,TIGER2_SPR.PLATFORM.ground.pxMax);
            petAnim.py=TIGER2_SPR.PLATFORM.ground.py;
            petAnim.jumpFail=false;
            say(pick(JUMP_FAIL_LINES));
            schedulePetBehavior();
          }else{
            petAnim.state='idle';petAnim.platform='upper';
            petAnim.px=petAnim.jumpTo.px;petAnim.py=petAnim.jumpTo.py;
            petAnim.runMode=false;
            petAnim.upperLeaveAt=ts+12000+Math.random()*10000;
            schedulePetBehavior();
            setTimeout(()=>maybeSayPlatformLine(0.5),480);
            if(petAnim.pendingMove){const p=petAnim.pendingMove;petAnim.pendingMove=null;commandPetMoveTo(p.px,p.py);}
          }
        }
      }else{
        petAnim.jumpIdx--;
        if(petAnim.jumpIdx<0){
          petAnim.state='idle';petAnim.platform='ground';
          petAnim.px=petAnim.jumpTo.px;petAnim.py=petAnim.jumpTo.py;
          petAnim.runMode=false;
          schedulePetBehavior();
          if(petAnim.pendingMove){const p=petAnim.pendingMove;petAnim.pendingMove=null;commandPetMoveTo(p.px,p.py);}
        }
      }
    }
    const pos=jumpArcPos(petAnim.jumpIdx,petAnim.jumpDir);
    setPetPos(pos.px,pos.py);
    if(petAnim.jumpFail&&petAnim.jumpDir>0&&petAnim.jumpIdx>=5)petAnim.frame=15;
    else petAnim.frame=J.jump[clamp(petAnim.jumpIdx,0,7)];
    sheetKey='tiger2';
  }else if(petAnim.state==='panic'){
    sheetKey='tiger3';
    petAnim.panicAccum+=dt;
    const P=TIGER3_SPR.IDX.panic;
    while(petAnim.panicAccum>=TIGER3_SPR.PANIC_MS){
      petAnim.panicAccum-=TIGER3_SPR.PANIC_MS;
      petAnim.panicIdx++;
      if(petAnim.panicPhase==='recover'){
        if(petAnim.panicIdx>7){finishPanicToIdle(ts,comfortable,I);break;}
      }else if(petAnim.panicIdx>P.length-1){
        petAnim.panicIdx=0;petAnim.panicLoops++;
        if(petAnim.panicLoops>=petAnim.panicMaxLoops){
          petAnim.panicPhase='recover';petAnim.panicIdx=6;break;
        }
      }
    }
    if(isPanicking()){
      const fi=petAnim.panicPhase==='recover'?clamp(petAnim.panicIdx,6,7):clamp(petAnim.panicIdx,0,7);
      petAnim.frame=P[fi];
      const c=navCenter();petAnim.flip=c.px>=petAnim.px?1:-1;
    }
  }else if(petAnim.state==='sleep'){
    sheetKey='tiger3';
    petAnim.sleepAccum+=dt;
    while(petAnim.sleepAccum>=TIGER3_SPR.SLEEP_MS){
      petAnim.sleepAccum-=TIGER3_SPR.SLEEP_MS;
      petAnim.sleepIdx=(petAnim.sleepIdx+1)%TIGER3_SPR.IDX.sleep.length;
    }
    petAnim.frame=TIGER3_SPR.IDX.sleep[petAnim.sleepIdx];
  }else if(petAnim.state==='action'){
    if(petAnim.control==='user'){petAnim.state='idle';}
    else if(!comfortable){petAnim.state='idle';petAnim.frame=moodIdleFrame(ts);schedulePetBehavior();sheetKey='tiger2';}
    else if(ts>=petAnim.actionUntil){petAnim.state='idle';petAnim.frame=I.idle;schedulePetBehavior();}
  }else if(petAnim.state==='walk'){
    const targetPy=petAnim.targetPy!=null?petAnim.targetPy:(onStairsPath(petAnim.targetPx,petAnim.py)?petAnim.py:walkBounds().pyFor(petAnim.targetPx));
    const dx=petAnim.targetPx-petAnim.px,dy=targetPy-petAnim.py;
    const dist=Math.hypot(dx,dy);
    let walkMs=TIGER_SPR.WALK_MS,moveSpd=PET_MOVE.baseSpd;
    if(severe){walkMs=TIGER_SPR.WALK_MS*1.5;moveSpd=0.016;}
    else if(glum){walkMs=TIGER_SPR.WALK_MS*1.2;moveSpd=0.022;}
    else if(petAnim.control==='user'){walkMs=TIGER_SPR.WALK_MS*0.95;moveSpd=PET_MOVE.userSpd;}
    else if(onStairsPath(petAnim.px,petAnim.py))moveSpd=PET_MOVE.baseSpd*0.85;
    if(dist<PET_MOVE.arriveDist){
      finishPetWalk(ts,comfortable,severe,I);
    }else{
      const step=moveSpd*dt,ratio=Math.min(1,step/dist);
      petAnim.px+=dx*ratio;petAnim.py+=dy*ratio;
      if(!onStairsPath(petAnim.px,petAnim.py)){
        const c=clampToNav(petAnim.px,petAnim.py,isOnUpperPlatform()?'upper':'ground');
        petAnim.px=c.px;petAnim.py=c.py;petAnim.platform=c.platform;
      }else if(petAnim.py<NAV.ground.pyMin-5)petAnim.platform='upper';
      if(typeof tryEatHomeObject==='function')tryEatHomeObject(); // 走到覆蓋物件時即吃掉
      petAnim.flip=dx>=0?1:-1;
      if(severe&&petAnim.control!=='user'&&Math.random()<0.0018*dt){
        petAnim.state='idle';petAnim.runMode=false;petAnim.frame=moodIdleFrame(ts);schedulePetBehavior();
      }else{
        petAnim.walkAccum+=dt;
        if(petAnim.walkAccum>=walkMs){
          petAnim.walkAccum=0;
          if(comfortable&&isTigerSprite()){petAnim.walkIdx=(petAnim.walkIdx+1)%I.walk.length;petAnim.frame=I.walk[petAnim.walkIdx];}
          else if(isTigerSprite()){petAnim.frame=moodIdleFrame(ts);sheetKey='tiger2';}
        }
      }
      setPetPos(petAnim.px,petAnim.py);
      if(!comfortable&&isTigerSprite())sheetKey='tiger2';
    }
  }else{
    if(petAnim.control!=='user'&&!isPanicking()&&!isSleeping()&&ts>=petAnim.behaviorAt){
      schedulePetBehavior();

/* ── 動態預算判斷（時間進度 × 消費進度）──
   不再用「已用 X% 預算」一刀切，而是比較「依目前消費速度推估的月底總花費」與預算。
   pace = 推估月底花費 / 預算 = 消費進度 / 時間進度（>1 代表花得比時間快）。
   回傳：state 狀態、cls 天氣型態、emoji/label/txt 顯示、warn 是否顯示「接近預算上限」。 */
function budgetStatus(){
  const now=new Date();
  const m=todayStr().slice(0,7);
  let C=0; S.tx.forEach(t=>{if(t.ts.slice(0,7)===m&&t.type==='expense')C+=t.amount;}); // 當月累積消費 C_current
  const Dtotal=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();  // 當月總天數
  const Dcurrent=Math.max(1,now.getDate());                              // 目前已過天數
  const B=Math.max(1,S.budget);                                          // 當月總預算
  const timeProgress=Dcurrent/Dtotal;                                    // 時間進度
  const spendProgress=C/B;                                               // 消費進度
  const projected=C/Dcurrent*Dtotal;                                     // 預計月底總花費
  const pace=spendProgress/timeProgress;                                 // 消費/時間，等同 projected/B
  let s;
  if(spendProgress>=1)   s={state:'over',  label:'超支',    cls:'storm',  txt:'本月預算已用盡',        warn:true};
  else if(pace>1.5)      s={state:'over',  label:'超支預警', cls:'storm',  txt:'照這速度會嚴重超支',    warn:true};
  else if(pace>1.15)     s={state:'alert', label:'警戒',    cls:'cloudy', txt:'消費超前，接近預算上限', warn:true};
  else if(pace>0.9)      s={state:'normal',label:'正常',    cls:'partly', txt:'消費節奏合理',          warn:false};
  else                   s={state:'safe',  label:'省錢',    cls:'sunny',  txt:'消費落後進度，超前部署', warn:false};
  s.isOverbudget=s.state==='over';
  s.projected=Math.round(projected); s.pace=pace; s.spendProgress=spendProgress; s.timeProgress=timeProgress; s.exp=C;
  return s;
}
/* 狀態燈顏色：綠(健康)→黃(普通)→紅(嚴重)，隨 pace 連續變化，越嚴重越深越飽和 */
function ledColor(pace){
  const p=Math.max(0,Math.min(1.6,pace||0));
  let hue;
  if(p<=0.6)      hue=125;                 // 深綠：很健康
  else if(p>=1.5) hue=0;                   // 紅：嚴重
  else            hue=125*(1-(p-0.6)/0.9); // 綠→黃→紅 連續漸層
  const sat=Math.round(70+Math.min(25,p*18));   // 越嚴重越飽和
  const light=Math.round(52-Math.min(12,p*7));  // 越嚴重越深
  return `hsl(${Math.round(hue)},${sat}%,${light}%)`;
}
function monthWeather(){
  const b=budgetStatus();
  const mood=moodValue();
  const led=`<span class="led" style="--c:${ledColor(b.pace)}"></span>`;
  if(S.pet.health<30)
    return {cls:'storm', tag:`${led}寵物重病<br><span style="font-size:10px">快照顧牠、修正財務</span>`, warn:b.warn};
  if(mood<MOOD.LOW)
    return {cls:'storm', tag:`${led}心情低落<br><span style="font-size:10px">陪玩玩、聊聊天讓牠振作</span>`, warn:true};
  if(mood>MOOD.COMFORT&&b.isOverbudget)
    return {cls:'partly', tag:`${led}${b.label}<br><span style="font-size:10px">${b.txt}・但心情已恢復</span>`, warn:b.warn};
  if(mood<=MOOD.COMFORT&&mood>=MOOD.LOW)
    return {cls:'cloudy', tag:`${led}心情轉好中<br><span style="font-size:10px">再多陪陪牠吧</span>`, warn:b.warn};
  return {cls:b.cls, tag:`${led}${b.label}<br><span style="font-size:10px">${b.txt}</span>`, warn:b.warn};
}

function weekStartStr(){
  const d=new Date();const day=d.getDay();const diff=(day+6)%7;
  const mon=new Date(d);mon.setDate(d.getDate()-diff);
  return mon.toISOString().slice(0,10);
}
function txDate(t){return(typeof t.ts==='function'?t.ts():t.ts).slice(0,10);}
function txInPeriod(t,period){
  const ds=txDate(t);
  if(period==='day')return ds===todayStr();
  if(period==='week')return ds>=weekStartStr()&&ds<=todayStr();
  return ds.slice(0,7)===todayStr().slice(0,7);
}
function periodBudget(period){
  const now=new Date();
  const Dtotal=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const B=Math.max(1,S.budget);
  if(period==='month')return B;
  if(period==='day')return Math.round(B/Dtotal);
  return Math.round(B*7/Dtotal);
}
function periodTimeProgress(period){
  const now=new Date();
  if(period==='day'){
    const h=now.getHours()+now.getMinutes()/60;
    return Math.max(0.04,h/24);
  }
  if(period==='week'){
    const d=now.getDay();
    const elapsed=((d+6)%7)+1;
    return Math.max(0.14,elapsed/7);
  }
  const Dtotal=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  return Math.max(0.04,now.getDate()/Dtotal);
}

  const left=budget-exp;
  const spendProgress=exp/budget;
  const timeProgress=periodTimeProgress(period);
  const pace=spendProgress/timeProgress;
  const pct=Math.round(spendProgress*100);
  const over=exp>budget;
  let label,txt;
  if(spendProgress>=1){label='超支';txt=period==='day'?'今日預算已用盡':period==='week'?'本週預算已用盡':'本月預算已用盡';}

    month:['本月收入','本月支出','連續天數']
  };
  return{title:titles[period],budget,exp,inc,left,pct,over,pace,label,txt,chipLabels:chipLabels[period]};

// 記帳核心：可由表單或聊天呼叫
function recordTx({type,amount,category,note='',hasPhoto=false,photo=null}){
  type=(type==='income')?'income':'expense';
  const amt=Math.abs(parseInt(amount||0));
  if(!amt)return null;
  const cat=(CATS[type].find(c=>c[1]===category))?category:'其他';
  const onCD=Date.now()-S.lastPhotoCrit<600000;
  const crit=hasPhoto&&!onCD;
  const base=Math.max(5,Math.round(amt/50));
  const coinGain=crit?base*2:base;
  const expGain=(crit?10:5)+(type==='income'?3:0);
  S.tx.unshift({id:Date.now(),ts:new Date().toISOString(),type,category:cat,amount:amt,note:note||'',hasPhoto,photo});
  trimPhotos();
  S.wallet.coins+=coinGain;
  gainExp(expGain);
  if(crit)S.lastPhotoCrit=Date.now();
  S.pet.hunger=clamp(S.pet.hunger+8);
  S.pet.happiness=clamp(S.pet.happiness+(type==='income'?6:4)+(crit?25:0));
  if(type==='income')S.pet.health=clamp(S.pet.health+3);
  syncPetMoodState();
  updateStreak();
  if(typeof touchPetActivity==='function')touchPetActivity();
  if(isSleeping())wakeFromSleep();
  return {coinGain,expGain,crit,amt,type,cat};
}
function addTx(){
  const amt=Math.abs(parseInt($('#amt').value||'0'));
  if(!amt){toast('請輸入金額');return;}
  const r=recordTx({type:draft.type,amount:amt,category:draft.cat,note:$('#note').value.trim(),hasPhoto:!!draft.photo,photo:draft.photo});
  draft.photo=null;
  say(r.crit?'📸 相片暴擊！雙倍獎勵到手～':recordLine(r));
  toast(`+${r.coinGain}${coinIc(true)}  +${r.expGain}EXP${r.crit?'  ⚡暴擊':''}`);
  renderAll();hop();switchTab('ledger');
}

function gainExp(x){
  S.pet.exp+=x;
  while(S.pet.exp>=lvlNeed(S.pet.level)){
    S.pet.exp-=lvlNeed(S.pet.level);S.pet.level++;
    if(S.pet.stage<4 && S.pet.level%3===0){S.pet.stage++;say(`✨進化！變成${STAGE_NM[S.pet.stage]}了！`);toast('🎉 寵物進化！');}
    else toast('⬆️ 升級 Lv.'+S.pet.level);
  }
}
function loseExp(x){ // 時空悖論降級
  S.pet.exp-=x;
  while(S.pet.exp<0 && S.pet.level>1){
    S.pet.level--;S.pet.exp+=lvlNeed(S.pet.level);
    if(S.pet.stage>2 && S.pet.level%3===2){S.pet.stage--;say('⏳時空悖論…我退化了…😿');toast('⚠️ 寵物降級！');}
  }

}

function renderArmy(a){

  return `<div class="army-item">

function deploy(){
  rollDay();
  const u=UNIT(warDraft.unit);const cost=u.cost*warDraft.count;
  if(S.daily.recruits>=5){toast('今日招募已達上限');return;}
  if(S.wallet.coins<cost){toast('代幣不足');return;}
  S.wallet.coins-=cost;S.daily.recruits++;S.daily.deploys++;
  // 模擬市場走勢
  const move=+(gauss()*4).toFixed(1); // 約 -12~+12%
  let count=warDraft.count, status, pnl=0;
  if(u.id==='long'){ count=Math.max(0,Math.round(count*(1+move/100*1.5))); }
  if(u.id==='short'){ count=Math.max(0,Math.round(count*(1-move/100*1.5))); }
  if(u.id==='call'){ count=move>=3?Math.round(count*(3+move)):0; }
  if(u.id==='put'){ count=move<=-3?Math.round(count*(3+Math.abs(move))):0; }
  const value=Math.round(count* (u.id==='long'||u.id==='short'?40:90));
  pnl=value-cost;
  status=count>warDraft.count?'win':(count===0?'lose':(count<warDraft.count?'lose':'neutral'));
  const a={id:Date.now(),unit:u.id,ticker:warDraft.ticker,count,result:move,status,pnl,value};
  S.army.unshift(a);
  S.battleLog.unshift({ts:Date.now(),unit:u.nm,ticker:warDraft.ticker,move,pnl});
  // 主寵物連動
  if(status==='win'){S.pet.happiness=clamp(S.pet.happiness+10);say(pick(LINES.win));toast(`⚔️ ${warDraft.ticker} ${move>0?'+':''}${move}% ・大捷！`);}
  else if(status==='lose'){S.pet.health=clamp(S.pet.health-12);say(pick(LINES.lose));toast(`💥 ${warDraft.ticker} ${move}% ・前線折損`);}
  else toast(`${warDraft.ticker} ${move>0?'+':''}${move}%・小勝負`);
  renderAll();switchTab('war');
}
function recall(id){
  const i=S.army.findIndex(a=>a.id===id);if(i<0)return;
  const a=S.army[i];const back=a.value||0;
  S.wallet.coins+=back;S.army.splice(i,1);
  toast(`召回！換回 ${fmt(back)}${coinIc(true)}`);
  if(back>0)gainExp(4);
  renderAll();switchTab('war');
}
function gauss(){let u=0,v=0;while(!u)u=Math.random();while(!v)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);}

function decay(){
  const last=S._lastDecay||Date.now();
  const hrs=(Date.now()-last)/3600000;
  if(hrs>=1){
    const d=Math.floor(hrs);
    S.pet.hunger=clamp(S.pet.hunger-d*3);
    S.pet.happiness=clamp(S.pet.happiness-d*2);
    if(S.pet.hunger<20)S.pet.health=clamp(S.pet.health-d*2);
    S._lastDecay=Date.now();
    if(S.pet.hunger<30)say(pick(LINES.hungry));
  }
}

// 解析聊天裡的隱藏記帳指令 <<LOG {...}>>，真正寫入帳本
function applyChatLog(text){
  const m=text.match(/<<\s*LOG\s*(\{[\s\S]*?\})\s*>>/i);
  if(!m)return {clean:text,tx:null};
  const clean=text.replace(m[0],'').trim();
  try{
    const o=JSON.parse(m[1]);
    const r=recordTx({type:o.type,amount:o.amount,category:o.category,note:o.note||'（聊天記帳）'});
    if(r)return {clean,tx:r};
  }catch(e){}
  return {clean,tx:null};
}
function getPetReply(text){
  // 一律嘗試呼叫後端；若後端未啟動（如以 file:// 開啟）或連線失敗，靜默退回內建台詞
  return callGemini(text).catch(()=>cannedReply(text));
}
function cannedReply(text){
  const p=S.pet;
  if(/超支|沒錢|花太多|破產/.test(text))return petMoodDialogue(moodValue())||pick(LINES.over);
  if(/存|省|儲蓄|預算/.test(text))return petMoodDialogue(moodValue())||pick(LINES.save);
  if(/股|投資|買|賣|大盤|聖戰|小兵/.test(text))return '前線的事交給小兵們～不過記得，我只是模擬，別把戰場當真喔⚔️';
  if(/餓|吃|飯/.test(text))return pick(LINES.hungry);

}
function petSystemPrompt(){
  const p=S.pet, a=ANIMALS[p.animal]||ANIMALS[0], per=PERSONA[p.persona];

// 前端只呼叫本機後端 /api/chat；金鑰放在後端 .env，不會出現在前端
const API_BASE='';
async function callGemini(text){
  // 只送最近 10 則「純對話」給模型（排除記帳收據等系統訊息），控制 token 成本
  const history=S.chat.filter(m=>m.r==='pet'||m.r==='me').slice(-10).map(m=>({role:m.r==='pet'?'model':'user',parts:[{text:m.t}]}));
  const body={
    systemInstruction:{parts:[{text:petSystemPrompt()}]},
    contents:[...history,{role:'user',parts:[{text}]}],
    generationConfig:{temperature:0.9,maxOutputTokens:1024,topP:0.95,thinkingConfig:{thinkingBudget:0}}
  };
  const res=await fetch(API_BASE+'/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const data=await res.json().catch(()=>({}));
  if(!res.ok||data.error){
    const msg=data.error?.message||('HTTP '+res.status);
    return `（守護靈還沒連上線 💤）${msg}`;
  }
  const t=data?.candidates?.[0]?.content?.parts?.map(p=>p.text).join('')||'';
  return t.trim()||pick(LINES.idle);
}

const sheetEl=$('#sheet'), grabEl=$('#sheetGrab');
let SNAP={full:0,std:0,collapsed:0}, sheetSnap='std', dragging=false, startPY=0, startTY=0, liveTY=0;
function layoutSheet(){
  if(curTab==='home')renderSheetPeek();
  syncHudOffset();

  const grabH=grabEl.offsetHeight||118;
  SNAP={full:0,std:Math.round(H*0.44),collapsed:Math.max(Math.round(H*0.62),H-grabH)};
  setTY(SNAP[sheetSnap],false);
  document.documentElement.style.setProperty('--inv-fab-bottom',Math.max(12,Math.round(H-liveTY+10))+'px');
  layoutIsland();

function setTY(ty,anim){
  liveTY=ty;
  $('#app')?.classList.toggle('parallax-drag',!!anim);
  sheetEl.classList.toggle('atTop',ty<10);
  if(!anim){sheetEl.classList.add('dragging');}
  sheetEl.style.transform='translateY('+ty+'px)';
  if(!anim){requestAnimationFrame(()=>sheetEl.classList.remove('dragging'));}
  const appH=$('#app').clientHeight,hudH=$('#hud').offsetHeight,navH=$('#nav').offsetHeight;
  const H=appH-hudH-navH;
  document.documentElement.style.setProperty('--inv-fab-bottom',Math.max(12,Math.round(H-ty+10))+'px');
  layoutIsland();
  updateSceneParallax(ty);
}
function snapTo(name){sheetSnap=name;sheetEl.classList.remove('dragging');$('#app')?.classList.remove('parallax-drag');sheetEl.classList.toggle('atTop',name==='full');sheetEl.style.transform='translateY('+SNAP[name]+'px)';liveTY=SNAP[name];const appH=$('#app').clientHeight,hudH=$('#hud').offsetHeight,navH=$('#nav').offsetHeight;const H=appH-hudH-navH;document.documentElement.style.setProperty('--inv-fab-bottom',Math.max(12,Math.round(H-liveTY+10))+'px');layoutIsland();updateSceneParallax(liveTY);}
grabEl.addEventListener('pointerdown',e=>{
  dragging=true;startPY=e.clientY;startTY=SNAP[sheetSnap];
  sheetEl.classList.add('dragging');
  try{grabEl.setPointerCapture(e.pointerId);}catch(_){}
});
grabEl.addEventListener('pointermove',e=>{
  if(!dragging)return;
  setTY(clamp(startTY+(e.clientY-startPY),0,SNAP.collapsed),true);
});
function endDrag(){
  if(!dragging)return;dragging=false;
  sheetEl.classList.remove('dragging');
  let best='std',bd=1e9;
  for(const k in SNAP){const d=Math.abs(SNAP[k]-liveTY);if(d<bd){bd=d;best=k;}}
  snapTo(best);
}
grabEl.addEventListener('pointerup',endDrag);
grabEl.addEventListener('pointercancel',endDrag);
