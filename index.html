function applyAuthUser(u,isNewUser){
  const newOwner=ownerKeyForGoogle(u.googleId);
  const prevOwner=currentOwnerKey();
  const prevWasGuest=!!(prevOwner&&String(prevOwner).startsWith('guest'));
  if(prevWasGuest)purgeAllGuestLocalData();
  else flushOwnerStateIfNeeded(newOwner);
  localStorage.removeItem(GUEST_LS);
  localStorage.removeItem(GUEST_ID_LS);
  localStorage.setItem(AUTH_OWNER_LS,String(u.googleId));
  const accountChanged=!!(prevOwner&&newOwner&&prevOwner!==newOwner);

  S=loadStateForOwner(newOwner);
  S.guestMode=false;
  S.auth={email:u.email,name:u.name,picture:u.picture,googleId:u.googleId};
  S._ownerKey=newOwner;
  const zi=zodiacKeyToIndex(u.zodiacType);
  const a=ANIMALS[zi]||ANIMALS[0];

  if(isNewUser){
    if(u.wallet)S.wallet={...S.wallet,...u.wallet};
    S.pet.stage=2;
    if(S.pet.animal==null)S.pet.animal=zi;
    if(!S.onboarded){
      S.pet.name=S.pet.name||a.n;
      S.pet.named=false;
      S.onboarded=false;
    }
    S.tx=S.tx||[];
    if(u.klineHistory)S.market=u.klineHistory;
    if(u.gameState)importGameState(u.gameState);
  }else{
    const remote=u.gameState;
    if(remote){
      if(accountChanged){
        importGameState(remote);
      }else{
        const localAt=+(S._savedAt||0);
        const remoteAt=+(remote._savedAt||0);
        const localSnap={_savedAt:S._savedAt};
        GAME_STATE_KEYS.forEach(k=>{if(S[k]!==undefined)localSnap[k]=S[k];});
        const merged=remoteAt>=localAt
          ?mergeGameStateForSync(remote,localSnap)
          :mergeGameStateForSync(localSnap,remote);
        importGameState(merged);
      }
    }
    S.pet.stage=S.pet.stage||2;
    if(S.pet.animal==null)S.pet.animal=zi;
    if(S.onboarded){
      if(S.pet.named!==false)S.pet.named=true;
    }else if(remote?.onboarded){
      S.onboarded=true;
      if(S.pet.named!==false)S.pet.named=true;
    }else{
      S.pet.named=false;
    }
    if(!S.pet.name)S.pet.name=a.n;
    if(u.klineHistory && (!S.market||!S.market.stocks))S.market=u.klineHistory;
  }
  S.cosmetics=S.cosmetics||{owned:[],decos:[],skin:null};
  if(u.spineSkinId!=null)S.cosmetics.skin=u.spineSkinId;
  if(u.spineDecos?.length)S.cosmetics.decos=u.spineDecos.slice();
  PetRig.backend='spine';
  PetRig.setZodiac(S.pet.animal!=null?S.pet.animal:zi);
}

async function restoreAuthSession(token,attempt=0){
  const maxAttempts=3;
  try{
    const res=await fetch(apiUrl('/api/auth/me'),{headers:{Authorization:'Bearer '+token}});
    if(res.status===401||res.status===403||res.status===404){
      console.warn('[auth] session invalid:',res.status);
      return {ok:false,invalid:true};
    }
    if(!res.ok){
      if(attempt+1<maxAttempts){
        await new Promise(r=>setTimeout(r,600*(attempt+1)));
        return restoreAuthSession(token,attempt+1);
      }
      console.warn('[auth] session restore failed:',res.status);
      return {ok:false,invalid:false};
    }
    const data=await res.json();
    return {ok:true,user:data.user};
  }catch(err){
    if(attempt+1<maxAttempts){
      await new Promise(r=>setTimeout(r,600*(attempt+1)));
      return restoreAuthSession(token,attempt+1);
    }
    console.warn('[auth] session restore error:',err);
    return {ok:false,invalid:false};
  }
}

function waitForGsi(){
  return new Promise((resolve,reject)=>{
    if(window.google?.accounts?.id)return resolve();
    let n=0;
    const t=setInterval(()=>{
      if(window.google?.accounts?.id){clearInterval(t);resolve();}
      else if(++n>60){clearInterval(t);reject(new Error('Google 登入 SDK 載入逾時'));}
    },100);
  });
}

async function initAuth(){
  let cfg={};
  try{cfg=await fetch(apiUrl('/api/config')).then(r=>r.json());}catch(e){}
  _googleClientId=cfg.googleClientId||'';
  _enableBetaDebug=cfg.enableBetaDebug!==false;

  if(localStorage.getItem(GUEST_LS)==='1'){
    if(!localStorage.getItem(GUEST_ID_LS)){
      purgeAllGuestLocalData();
      showAuthGate();
      return false;
    }
    initGuestGameState(false);
    hideAuthGate();
    return true;
  }

  if(!cfg.authEnabled)return true;

  const token=localStorage.getItem(AUTH_LS);
  if(token){
    const session=await restoreAuthSession(token);
    if(session.ok&&session.user){applyAuthUser(session.user,false);hideAuthGate();save();return true;}
    if(session.invalid)localStorage.removeItem(AUTH_LS);
  }

  showAuthGate();
  try{
    await waitForGsi();
    initGoogleAuth(_googleClientId);
  }catch(err){
    authDevHint(err.message);
    $('#authGateErr').textContent='Google 登入載入失敗，可先使用訪客試玩';
  }
  return false;
}

function sanitizePhotoForCloudSync(photo){
  if(!photo)return null;
  if(typeof photo==='string'){
    if(photo.startsWith('data:')||photo.startsWith('blob:'))return null;
    return photo;
  }
  return {
    id:photo.id,mime:photo.mime,width:photo.width,height:photo.height,bytes:photo.bytes,
    uploadStatus:photo.uploadStatus||'pending',storageKey:photo.storageKey||null,remoteUrl:photo.remoteUrl||null
  };
}
async function hydrateTxPhotosForCloudSync(){
  const txList=Array.isArray(S.tx)?S.tx:[];
  for(const t of txList){
    if(!t)continue;
    if(typeof t.photoData==='string'&&(t.photoData.startsWith('data:')||t.photoData.startsWith('http')))continue;
    if(t.photo?.remoteUrl){
      t.photoData=t.photo.remoteUrl;
      continue;
    }
    try{
      const data=await assetToPhotoData(t.photo);
      if(typeof data==='string'&&data.startsWith('data:'))t.photoData=data;
    }catch(e){console.warn('[photo] hydrate for sync failed:',e);}
  }
}
function isPersistablePhotoData(pd){
  return typeof pd==='string'&&(pd.startsWith('data:')||pd.startsWith('http://')||pd.startsWith('https://'));
}
function mergeTxPhotoRowsForSync(existingTx,incomingTx){
  if(!Array.isArray(incomingTx))return Array.isArray(existingTx)?existingTx:[];
  if(!Array.isArray(existingTx))return incomingTx;
  const prevById=new Map(existingTx.filter(t=>t&&t.id!=null).map(t=>[t.id,t]));
  const seen=new Set();
  const out=[];
  incomingTx.forEach(t=>{
    if(!t||t.id==null){out.push(t);return;}
    seen.add(t.id);
    const prev=prevById.get(t.id);
    if(!prev){out.push(t);return;}
    const merged={...prev,...t};
    if(isPersistablePhotoData(t.photoData))merged.photoData=t.photoData;
    else if(isPersistablePhotoData(prev.photoData))merged.photoData=prev.photoData;
    else delete merged.photoData;
    merged.photo=sanitizePhotoForCloudSync(merged.photo);
    out.push(merged);
  });
  existingTx.forEach(t=>{
    if(t&&t.id!=null&&!seen.has(t.id))out.push(t);
  });
  return out.sort((a,b)=>new Date(b.ts)-new Date(a.ts));
}
function mergeGameStateForSync(base,overlay){
  if(!overlay||typeof overlay!=='object')return base;
  if(!base||typeof base!=='object')return overlay;
  const merged={...base,...overlay};
  if(Array.isArray(base.tx)||Array.isArray(overlay.tx)){
    merged.tx=mergeTxPhotoRowsForSync(base.tx,overlay.tx);
  }
  merged._savedAt=Math.max(+(base._savedAt||0),+(overlay._savedAt||0))||Date.now();
  return merged;
}

function raySegmentHit(ox,oy,tx,ty,ax,ay,bx,by){
  const rdx=tx-ox,rdy=ty-oy,sdx=bx-ax,sdy=by-ay;
  const denom=rdx*sdy-rdy*sdx;
  if(Math.abs(denom)<1e-9)return null;
  const t=((ax-ox)*sdy-(ay-oy)*sdx)/denom;
  const u=((ax-ox)*rdy-(ay-oy)*rdx)/denom;
  if(t<=0.001||u<0||u>1)return null;
  return{t,px:ox+rdx*t,py:oy+rdy*t};
}

    const h=raySegmentHit(ox,oy,tx,ty,a.px,a.py,b.px,b.py);
    if(h)hits.push(h);

  if(Math.abs(px-z.pxMin)<1.2)return{px:z.pxMin+eps,py:pyFor(z.pxMin+eps),platform:tier};
  if(Math.abs(px-z.pxMax)<1.2)return{px:z.pxMax-eps,py:pyFor(z.pxMax-eps),platform:tier};
  if(Math.abs(py-z.pyMax)<1.2)return{px:clamp(px,z.pxMin,z.pxMax),py:z.pyMax-eps,platform:tier};
  if(Math.abs(py-z.pyMin)<1.2)return{px:clamp(px,z.pxMin,z.pxMax),py:z.pyMin+eps,platform:tier};

function tickTiger4Kitchen(dt){
  const k=tiger4Anim.kitchen,T=TIGER4_SPR;
  if(scenePet.kitchen.state==='walk')return T.REST_IDLE;
  if(k.state==='eating'){
    k.eatElapsed+=dt;
    k.eatAccum+=dt;
    while(k.eatAccum>=T.EAT_MS){
      k.eatAccum-=T.EAT_MS;
      k.eatIdx=(k.eatIdx+1)%T.IDX.eat.length;
    }
    if(k.eatElapsed>=T.EAT_DURATION_MS){
      finishKitchenEating();
      return T.REST_IDLE;
    }
    return T.IDX.eat[k.eatIdx];
  }
  const seq=T.IDLE_SEQ;
  k.accum+=dt;
  const step=seq[k.seqIdx];
  if(k.accum>=step.ms){
    k.accum-=step.ms;
    k.seqIdx=(k.seqIdx+1)%seq.length;
  }
  return seq[k.seqIdx].f;
}

}

function jumpArcPos(idx,dir){
  const from=petAnim.jumpFrom,to=petAnim.jumpTo;
  const g=TIGER2_SPR.PLATFORM;
  if(!from||!to)return{px:petAnim.px,py:petAnim.py};
  const smooth=t=>t*t*(3-2*t);
  if(petAnim.jumpFail&&dir>0){
    const peak={px:Math.min(from.px+6,79),py:g.upper.landPy+7};
    const land={px:clamp(from.px-1,g.ground.pxMin,g.ground.pxMax),py:g.ground.py};
    if(idx<=4){
      const e=smooth(idx/4);
      return{px:from.px+(peak.px-from.px)*e,py:from.py+(peak.py-from.py)*e};
    }
    const e=smooth((idx-4)/3);
    return{px:peak.px+(land.px-peak.px)*e,py:peak.py+(land.py-peak.py)*e};
  }
  let t=0;
  if(dir>0){if(idx<=1)t=0;else if(idx>=7)t=1;else t=(idx-1)/6;}
  else{if(idx>=7)t=0;else if(idx<=0)t=1;else t=1-(idx/7);}
  const e=smooth(t);
  return{px:from.px+(to.px-from.px)*e,py:from.py+(to.py-from.py)*e};
}
function startJump(dir,landOverride,userCmd){

    petAnim.jumpFrom={px:petAnim.px,py:groundSurfaceY(petAnim.px)};
    if(landOverride)petAnim.jumpTo={px:landOverride.px,py:landOverride.py};
    else{
      const landPx=clamp(u.landPx+(Math.random()*3-1.5),u.pxMin,u.pxMax);
      petAnim.jumpTo={px:landPx,py:upperSurfaceY(landPx)};
    }
    petAnim.jumpIdx=0;petAnim.jumpDir=1;
  }else{
    petAnim.jumpFail=false;
    petAnim.jumpFrom={px:petAnim.px,py:upperSurfaceY(petAnim.px)};
    petAnim.jumpTo={px:58+Math.random()*8,py:g.ground.py};

    beginPetPath([{px:target,py:upperSurfaceY(target)}]);

  const g=NAV.ground,m=1.8;

function petLoop(ts){
  if(S.pet.stage<2){stopPetAnimator();return;}
  const dt=Math.min(48,ts-(petAnim.lastTs||ts));petAnim.lastTs=ts;
  const I=TIGER_SPR.IDX,J=TIGER2_SPR.IDX,canvas=$('#petCanvas');
  const severe=isMoodSevere(),glum=isMoodGlum(),comfortable=isMoodComfortable();
  if(isTigerSprite())syncPetMoodState(ts);
  if(isTigerSprite()&&!petAnim.sheetsReady){petAnim.raf=requestAnimationFrame(petLoop);return;}
  let sheetKey='tiger';
  if(petAnim.state==='jump'){
    petAnim.jumpAccum+=dt;
    while(petAnim.jumpAccum>=TIGER2_SPR.JUMP_MS){
      petAnim.jumpAccum-=TIGER2_SPR.JUMP_MS;
      if(petAnim.jumpDir>0){
        petAnim.jumpIdx++;
        if(petAnim.jumpIdx>7){
          if(petAnim.jumpFail){
            petAnim.state='idle';petAnim.platform='ground';
            petAnim.px=clamp(petAnim.jumpFrom.px,TIGER2_SPR.PLATFORM.ground.pxMin,TIGER2_SPR.PLATFORM.ground.pxMax);
            petAnim.py=TIGER2_SPR.PLATFORM.ground.py;
            petAnim.jumpFail=false;
            say(pick(JUMP_FAIL_LINES));
            schedulePetBehavior();
          }else{
            petAnim.state='idle';petAnim.platform='upper';
            petAnim.px=petAnim.jumpTo.px;petAnim.py=petAnim.jumpTo.py;
            petAnim.runMode=false;
            petAnim.upperLeaveAt=ts+12000+Math.random()*10000;
            schedulePetBehavior();
            setTimeout(()=>maybeSayPlatformLine(0.5),480);
            if(petAnim.pendingMove){const p=petAnim.pendingMove;petAnim.pendingMove=null;commandPetMoveTo(p.px,p.py);}
          }
        }
      }else{
        petAnim.jumpIdx--;
        if(petAnim.jumpIdx<0){
          petAnim.state='idle';petAnim.platform='ground';
          petAnim.px=petAnim.jumpTo.px;petAnim.py=petAnim.jumpTo.py;
          petAnim.runMode=false;
          schedulePetBehavior();
          if(petAnim.pendingMove){const p=petAnim.pendingMove;petAnim.pendingMove=null;commandPetMoveTo(p.px,p.py);}
        }
      }
    }
    const pos=jumpArcPos(petAnim.jumpIdx,petAnim.jumpDir);
    setPetPos(pos.px,pos.py);
    if(petAnim.jumpFail&&petAnim.jumpDir>0&&petAnim.jumpIdx>=5)petAnim.frame=15;
    else petAnim.frame=J.jump[clamp(petAnim.jumpIdx,0,7)];
    sheetKey='tiger2';
  }else if(petAnim.state==='panic'){
    sheetKey='tiger3';
    petAnim.panicAccum+=dt;
    const P=TIGER3_SPR.IDX.panic;
    while(petAnim.panicAccum>=TIGER3_SPR.PANIC_MS){
      petAnim.panicAccum-=TIGER3_SPR.PANIC_MS;
      petAnim.panicIdx++;
      if(petAnim.panicPhase==='recover'){
        if(petAnim.panicIdx>7){finishPanicToIdle(ts,comfortable,I);break;}
      }else if(petAnim.panicIdx>P.length-1){
        petAnim.panicIdx=0;petAnim.panicLoops++;
        if(petAnim.panicLoops>=petAnim.panicMaxLoops){
          petAnim.panicPhase='recover';petAnim.panicIdx=6;break;
        }
      }
    }
    if(isPanicking()){
      const fi=petAnim.panicPhase==='recover'?clamp(petAnim.panicIdx,6,7):clamp(petAnim.panicIdx,0,7);
      petAnim.frame=P[fi];
      const c=navCenter();petAnim.flip=c.px>=petAnim.px?1:-1;
    }
  }else if(petAnim.state==='sleep'){
    sheetKey='tiger3';
    petAnim.sleepAccum+=dt;
    while(petAnim.sleepAccum>=TIGER3_SPR.SLEEP_MS){
      petAnim.sleepAccum-=TIGER3_SPR.SLEEP_MS;
      petAnim.sleepIdx=(petAnim.sleepIdx+1)%TIGER3_SPR.IDX.sleep.length;
    }
    petAnim.frame=TIGER3_SPR.IDX.sleep[petAnim.sleepIdx];
  }else if(petAnim.state==='action'){
    if(petAnim.control==='user'){petAnim.state='idle';}
    else if(!comfortable){petAnim.state='idle';petAnim.frame=moodIdleFrame(ts);schedulePetBehavior();sheetKey='tiger2';}
    else if(ts>=petAnim.actionUntil){petAnim.state='idle';petAnim.frame=I.idle;schedulePetBehavior();}
  }else if(petAnim.state==='walk'){
    const targetPy=petAnim.targetPy!=null?petAnim.targetPy:(onStairsPath(petAnim.targetPx,petAnim.py)?petAnim.py:walkBounds().pyFor(petAnim.targetPx));
    const dx=petAnim.targetPx-petAnim.px,dy=targetPy-petAnim.py;
    const dist=Math.hypot(dx,dy);
    let walkMs=TIGER_SPR.WALK_MS,moveSpd=PET_MOVE.baseSpd;
    if(severe){walkMs=TIGER_SPR.WALK_MS*1.5;moveSpd=0.016;}
    else if(glum){walkMs=TIGER_SPR.WALK_MS*1.2;moveSpd=0.022;}
    else if(petAnim.control==='user'){walkMs=TIGER_SPR.WALK_MS*0.95;moveSpd=PET_MOVE.userSpd;}
    else if(onStairsPath(petAnim.px,petAnim.py))moveSpd=PET_MOVE.baseSpd*0.85;
    if(dist<PET_MOVE.arriveDist){
      finishPetWalk(ts,comfortable,severe,I);
    }else{
      const step=moveSpd*dt,ratio=Math.min(1,step/dist);
      petAnim.px+=dx*ratio;petAnim.py+=dy*ratio;
      if(!onStairsPath(petAnim.px,petAnim.py)){
        const c=clampToNav(petAnim.px,petAnim.py,isOnUpperPlatform()?'upper':'ground');
        petAnim.px=c.px;petAnim.py=c.py;petAnim.platform=c.platform;
      }else if(petAnim.py<NAV.ground.pyMin-5)petAnim.platform='upper';
      if(typeof tryEatHomeObject==='function')tryEatHomeObject(); // 走到覆蓋物件時即吃掉
      petAnim.flip=dx>=0?1:-1;
      if(severe&&petAnim.control!=='user'&&Math.random()<0.0018*dt){
        petAnim.state='idle';petAnim.runMode=false;petAnim.frame=moodIdleFrame(ts);schedulePetBehavior();
      }else{
        petAnim.walkAccum+=dt;
        if(petAnim.walkAccum>=walkMs){
          petAnim.walkAccum=0;
          if(comfortable&&isTigerSprite()){petAnim.walkIdx=(petAnim.walkIdx+1)%I.walk.length;petAnim.frame=I.walk[petAnim.walkIdx];}
          else if(isTigerSprite()){petAnim.frame=moodIdleFrame(ts);sheetKey='tiger2';}
        }
      }
      setPetPos(petAnim.px,petAnim.py);
      if(!comfortable&&isTigerSprite())sheetKey='tiger2';
    }
  }else{
    if(petAnim.control!=='user'&&!isPanicking()&&!isSleeping()&&ts>=petAnim.behaviorAt){
      schedulePetBehavior();
      const tryBehave=comfortable||(!severe&&Math.random()<(glum?0.4:0.28));
      if(tryBehave)pickRandomBehavior();
    }
    if(isTigerSprite()&&petAnim.control!=='user'&&petAnim.state==='idle'&&(!petAnim.idleUntil||ts>=petAnim.idleUntil)){
      if(shouldPetSleep(ts))startSleep();
      else if(comfortable){
        if(ts<petAnim.blinkUntil)petAnim.frame=I.blink;
        else if(ts>=petAnim.nextBlinkAt){
          petAnim.blinkUntil=ts+140;
          petAnim.nextBlinkAt=ts+2800+Math.random()*4200;
          petAnim.frame=I.blink;
        }else petAnim.frame=I.idle;
      }else{petAnim.frame=moodIdleFrame(ts);sheetKey='tiger2';}
    }else if(isTigerSprite()&&!isSleeping()){petAnim.frame=moodIdleFrame(ts);sheetKey='tiger2';}
  }
  if(isTigerSprite()&&petAnim.sheetsReady){
    const hc=$('#petCanvas');
    if(hc)drawPetFrame(hc,petAnim.frame,petAnim.flip,sheetKey);
  }
  if(isTigerSprite()&&tiger4Anim.ready)updateTiger4SceneSprites(dt);
  else if(!isTigerSprite()){updateScenePetWalk(dt,'kitchen');updateScenePetWalk(dt,'bedroom');} // 非老虎：只搬動靜態圖位置
  petAnim.raf=requestAnimationFrame(petLoop);
}

/* ── 動態預算判斷（時間進度 × 消費進度）──
   不再用「已用 X% 預算」一刀切，而是比較「依目前消費速度推估的月底總花費」與預算。
   pace = 推估月底花費 / 預算 = 消費進度 / 時間進度（>1 代表花得比時間快）。
   回傳：state 狀態、cls 天氣型態、emoji/label/txt 顯示、warn 是否顯示「接近預算上限」。 */
function budgetStatus(){
  const now=new Date();
  const m=todayStr().slice(0,7);
  let C=0; S.tx.forEach(t=>{if(t.ts.slice(0,7)===m&&t.type==='expense')C+=t.amount;}); // 當月累積消費 C_current
  const Dtotal=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();  // 當月總天數
  const Dcurrent=Math.max(1,now.getDate());                              // 目前已過天數
  const B=Math.max(1,S.budget);                                          // 當月總預算
  const timeProgress=Dcurrent/Dtotal;                                    // 時間進度
  const spendProgress=C/B;                                               // 消費進度
  const projected=C/Dcurrent*Dtotal;                                     // 預計月底總花費
  const pace=spendProgress/timeProgress;                                 // 消費/時間，等同 projected/B
  let s;
  if(spendProgress>=1)   s={state:'over',  label:'超支',    cls:'storm',  txt:'本月預算已用盡',        warn:true};
  else if(pace>1.5)      s={state:'over',  label:'超支預警', cls:'storm',  txt:'照這速度會嚴重超支',    warn:true};
  else if(pace>1.15)     s={state:'alert', label:'警戒',    cls:'cloudy', txt:'消費超前，接近預算上限', warn:true};
  else if(pace>0.9)      s={state:'normal',label:'正常',    cls:'partly', txt:'消費節奏合理',          warn:false};
  else                   s={state:'safe',  label:'省錢',    cls:'sunny',  txt:'消費落後進度，超前部署', warn:false};
  s.isOverbudget=s.state==='over';
  s.projected=Math.round(projected); s.pace=pace; s.spendProgress=spendProgress; s.timeProgress=timeProgress; s.exp=C;
  return s;
}
/* 狀態燈顏色：綠(健康)→黃(普通)→紅(嚴重)，隨 pace 連續變化，越嚴重越深越飽和 */
function ledColor(pace){
  const p=Math.max(0,Math.min(1.6,pace||0));
  let hue;
  if(p<=0.6)      hue=125;                 // 深綠：很健康
  else if(p>=1.5) hue=0;                   // 紅：嚴重
  else            hue=125*(1-(p-0.6)/0.9); // 綠→黃→紅 連續漸層
  const sat=Math.round(70+Math.min(25,p*18));   // 越嚴重越飽和
  const light=Math.round(52-Math.min(12,p*7));  // 越嚴重越深
  return `hsl(${Math.round(hue)},${sat}%,${light}%)`;
}
function monthWeather(){
  const b=budgetStatus();
  const mood=moodValue();
  const led=`<span class="led" style="--c:${ledColor(b.pace)}"></span>`;
  if(S.pet.health<30)
    return {cls:'storm', tag:`${led}寵物重病<br><span style="font-size:10px">快照顧牠、修正財務</span>`, warn:b.warn};
  if(mood<MOOD.LOW)
    return {cls:'storm', tag:`${led}心情低落<br><span style="font-size:10px">陪玩玩、聊聊天讓牠振作</span>`, warn:true};
  if(mood>MOOD.COMFORT&&b.isOverbudget)
    return {cls:'partly', tag:`${led}${b.label}<br><span style="font-size:10px">${b.txt}・但心情已恢復</span>`, warn:b.warn};
  if(mood<=MOOD.COMFORT&&mood>=MOOD.LOW)
    return {cls:'cloudy', tag:`${led}心情轉好中<br><span style="font-size:10px">再多陪陪牠吧</span>`, warn:b.warn};
  return {cls:b.cls, tag:`${led}${b.label}<br><span style="font-size:10px">${b.txt}</span>`, warn:b.warn};
}

function weekStartStr(){
  const d=new Date();const day=d.getDay();const diff=(day+6)%7;
  const mon=new Date(d);mon.setDate(d.getDate()-diff);
  return mon.toISOString().slice(0,10);
}
function txDate(t){return(typeof t.ts==='function'?t.ts():t.ts).slice(0,10);}
function txInPeriod(t,period){
  const ds=txDate(t);
  if(period==='day')return ds===todayStr();
  if(period==='week')return ds>=weekStartStr()&&ds<=todayStr();
  return ds.slice(0,7)===todayStr().slice(0,7);
}
function periodBudget(period){
  const now=new Date();
  const Dtotal=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const B=Math.max(1,S.budget);
  if(period==='month')return B;
  if(period==='day')return Math.round(B/Dtotal);
  return Math.round(B*7/Dtotal);
}
function periodTimeProgress(period){
  const now=new Date();
  if(period==='day'){
    const h=now.getHours()+now.getMinutes()/60;
    return Math.max(0.04,h/24);
  }
  if(period==='week'){
    const d=now.getDay();
    const elapsed=((d+6)%7)+1;
    return Math.max(0.14,elapsed/7);
  }
  const Dtotal=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  return Math.max(0.04,now.getDate()/Dtotal);
}
function homeBudgetView(period){
  const budget=periodBudget(period);
  let exp=0,inc=0;
  S.tx.forEach(t=>{
    if(!txInPeriod(t,period))return;
    if(t.type==='expense')exp+=t.amount;else inc+=t.amount;
  });
  const left=budget-exp;
  const spendProgress=exp/budget;
  const timeProgress=periodTimeProgress(period);
  const pace=spendProgress/timeProgress;
  const pct=Math.round(spendProgress*100);
  const over=exp>budget;
  let label,txt;
  if(spendProgress>=1){label='超支';txt=period==='day'?'今日預算已用盡':period==='week'?'本週預算已用盡':'本月預算已用盡';}
  else if(pace>1.5){label='超支預警';txt='照這速度會嚴重超支';}
  else if(pace>1.15){label='警戒';txt='消費超前，接近預算上限';}
  else if(pace>0.9){label='正常';txt='消費節奏合理';}
  else{label='省錢';txt='消費落後進度，超前部署';}
  const titles={day:'今日剩餘預算',week:'本週剩餘預算',month:'本月剩餘預算'};

async function fetchOwnerPhotoTransactions(){
  const local=localPhotoTransactions();
  const isGuest=isGuestSessionActive();
  if(isGuest){
    const gid=getGuestOwnerKey();
    if(!gid||S._ownerKey!==gid)return [];
    return local;
  }
  if(!S.auth?.googleId)return local;
  const token=localStorage.getItem(AUTH_LS);
  if(!token)return local;
  let res;
  try{
    res=await fetch(apiUrl('/api/photos'),{headers:{Authorization:'Bearer '+token}});
  }catch(err){
    console.warn('[photoWall] network error:',err);
    return local;
  }
  let data={photos:[]};
  try{data=await res.json();}catch(e){data={photos:[]};}
  const photos=Array.isArray(data.photos)?data.photos:[];
  if(res.status===401||res.status===403){
    if(S.auth?.googleId){
      console.warn('[photoWall] session expired while loading photos');
      localStorage.removeItem(AUTH_LS);
      closePhotoWall();
      showAuthGate();
      toast('登入已過期，請重新登入');
    }
    return [];
  }
  if(res.status===404)return local;
  if(!res.ok){
    console.warn('[photoWall] API error:',res.status,data?.error||'');
    if(res.status>=500)return local;
    return mergePhotoTransactions(local,photos);
  }

function computeGoalStats(g){
  if(!g||!g.target)return null;
  const start=new Date(g.start||Date.now());
  const now=new Date();
  const totalDays=Math.max(1,g.days||30);
  const elapsed=Math.max(0,Math.floor((now-start)/86400000));
  const remainDays=Math.max(1,totalDays-elapsed);
  let inc=0,exp=0;
  S.tx.forEach(t=>{const d=new Date(t.ts);if(d>=start){if(t.type==='income')inc+=t.amount;else exp+=t.amount;}});
  const saved=Math.max(0,inc-exp);
  const remainTarget=Math.max(0,g.target-saved);
  const progress=Math.max(0,Math.min(1,saved/g.target));
  const dailySave=remainTarget/remainDays;
  return {id:g.id,goal:g,saved,remainTarget,progress,dailySave,remainDays,totalDays,elapsed};
}
function recalcDreamBudget(){
  const goals=getSavingGoals().filter(g=>g&&g.target);
  const now=new Date();
  const daysInMonth=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const dailyBudget=Math.max(1,S.budget)/daysInMonth;
  const goalRows=goals.map(g=>computeGoalStats(g)).filter(Boolean);
  const totalDailySave=goalRows.reduce((s,x)=>s+x.dailySave,0);
  const baseDailySafe=Math.max(0,dailyBudget-totalDailySave);
  const SPREAD=3;
  const ykey=new Date(now.getTime()-86400000).toISOString().slice(0,10);
  let ySpent=0;S.tx.forEach(t=>{if(t.type==='expense'&&t.ts.slice(0,10)===ykey)ySpent+=t.amount;});
  const yOver=Math.max(0,ySpent-baseDailySafe);
  const cutPerDay=yOver>0?Math.round(yOver/SPREAD):0;
  const dailySafe=Math.max(0,Math.round(baseDailySafe-cutPerDay));
  const today=todayStr();
  let todaySpent=0;S.tx.forEach(t=>{if(t.type==='expense'&&t.ts.slice(0,10)===today)todaySpent+=t.amount;});
  const todayLeft=Math.max(0,dailySafe-todaySpent);
  const daysLeftMonth=Math.max(1,daysInMonth-now.getDate()+1);
  return {goals:goalRows,totalDailySave,dailyBudget,baseDailySafe,dailySafe,
    weeklySafe:Math.round(dailySafe*7),monthSafe:Math.round(dailySafe*daysLeftMonth),
    cutPerDay,yOver,todaySpent,todayLeft,daysLeftMonth,goalCount:goalRows.length};
}

const PHOTO_CRIT_CD_MS=600000;
let timeBoxModalOpen=false;

function cameraIconSrc(){
  return(typeof CAMERA_IMG_SRC!=='undefined'?encodeURI(CAMERA_IMG_SRC):encodeURI('ui source/camera.png'));
}
function isCameraKeyPixel(r,g,b){
  if(r<40&&g<40&&b<40)return true;
  if(g<=200||b<=200)return false;
  if(r<50)return true;
  return r<130&&(g-r)>100&&(b-r)>100;
}
function trimCameraContentBounds(data,sw,sh){
  let minX=sw,maxX=-1,minY=sh,maxY=-1;
  for(let y=0;y<sh;y++){
    for(let x=0;x<sw;x++){
      const i=(y*sw+x)*4;
      if(data[i+3]>128){minX=Math.min(minX,x);maxX=Math.max(maxX,x);minY=Math.min(minY,y);maxY=Math.max(maxY,y);}
    }
  }
  return maxX<minX?null:{minX,maxX,minY,maxY};
}
function processCameraIcon(img){
  const sw=img.width,sh=img.height;
  const src=document.createElement('canvas');
  src.width=sw;src.height=sh;
  const sctx=src.getContext('2d',{willReadFrequently:true});
  sctx.clearRect(0,0,sw,sh);
  sctx.drawImage(img,0,0);
  const id=sctx.getImageData(0,0,sw,sh),d=id.data;
  for(let i=0;i<d.length;i+=4){
    if(isCameraKeyPixel(d[i],d[i+1],d[i+2]))d[i+3]=0;
  }
  sctx.putImageData(id,0,0);
  const bounds=trimCameraContentBounds(d,sw,sh);
  if(!bounds)return src.toDataURL('image/png');
  const{minX,maxX,minY,maxY}=bounds;
  const cropW=maxX-minX+1,cropH=maxY-minY+1;
  const OUT=32;
  const scale=Math.min(OUT/cropW,OUT/cropH);
  const dw=Math.max(1,Math.round(cropW*scale)),dh=Math.max(1,Math.round(cropH*scale));
  const ox=Math.floor((OUT-dw)/2),oy=Math.floor((OUT-dh)/2);
  const out=document.createElement('canvas');
  out.width=OUT;out.height=OUT;
  const octx=out.getContext('2d');
  octx.clearRect(0,0,OUT,OUT);
  octx.imageSmoothingEnabled=false;
  octx.drawImage(src,minX,minY,cropW,cropH,ox,oy,dw,dh);
  return out.toDataURL('image/png');
}
function loadCameraIcon(){
  if(cameraIconDataUrl)return;
  const img=new Image();
  img.onload=()=>{
    cameraIconDataUrl=processCameraIcon(img);
    document.querySelectorAll('.tbox-title-ic,#albumFabIc').forEach(el=>{el.src=cameraIconDataUrl;});
  };
  img.onerror=()=>console.warn('相機圖示載入失敗');

function tboxDpr(){return Math.min(window.devicePixelRatio||1,3);}
const PHOTO_EXPORT_MAX=800;
const PHOTO_WEBP_QUALITY=0.75;
const photoBlobRegistry=new Map();
function supportsWebpExport(){
  if(supportsWebpExport._ok!==undefined)return supportsWebpExport._ok;
  try{
    const c=document.createElement('canvas');c.width=c.height=1;
    supportsWebpExport._ok=c.toDataURL('image/webp').startsWith('data:image/webp');
  }catch(_){supportsWebpExport._ok=false;}
  return supportsWebpExport._ok;
}
function fitPhotoExportSize(w,h,max=PHOTO_EXPORT_MAX){
  if(w<=max&&h<=max)return {w,h};
  const s=Math.min(max/w,max/h);
  return {w:Math.round(w*s),h:Math.round(h*s)};
}
function canvasToPhotoBlob(canvas){
  const mime=supportsWebpExport()?'image/webp':'image/jpeg';
  const quality=supportsWebpExport()?PHOTO_WEBP_QUALITY:0.82;
  return new Promise((resolve,reject)=>{
    canvas.toBlob(b=>b?resolve(b):reject(new Error('encode failed')),mime,quality);
  });
}
function createPhotoAsset(blob,w,h){
  const id='photo_'+Date.now()+'_'+Math.random().toString(36).slice(2,8);
  const asset={
    id,mime:blob.type||(supportsWebpExport()?'image/webp':'image/jpeg'),
    width:w,height:h,bytes:blob.size,uploadStatus:'pending',
    storageKey:null,remoteUrl:null,previewUrl:URL.createObjectURL(blob),_blob:blob
  };
  photoBlobRegistry.set(id,blob);
  return asset;
}
function releasePhotoAsset(asset){
  if(!asset||typeof asset==='string')return;
  if(asset.previewUrl?.startsWith('blob:'))URL.revokeObjectURL(asset.previewUrl);
  photoBlobRegistry.delete(asset.id);
  asset._blob=null;
}
function photoDisplaySrc(photo){
  if(!photo)return null;
  if(typeof photo==='string')return photo;
  return photo.remoteUrl||photo.previewUrl||null;
}
async function assetToPhotoData(asset){
  if(!asset)return null;
  if(typeof asset==='string'){
    if(asset.startsWith('data:')||asset.startsWith('http://')||asset.startsWith('https://')||asset.startsWith('blob:'))return asset;
    return null;
  }
  if(asset.remoteUrl)return asset.remoteUrl;
  const blob=asset._blob||photoBlobRegistry.get(asset.id);
  if(blob){
    return new Promise((resolve,reject)=>{
      const reader=new FileReader();
      reader.onload=()=>resolve(reader.result);
      reader.onerror=()=>reject(reader.error);
      reader.readAsDataURL(blob);
    });
  }
  return asset.previewUrl||null;
}
function serializePhotoAsset(asset){
  if(!asset)return null;
  if(typeof asset==='string')return asset;
  return {
    id:asset.id,mime:asset.mime,width:asset.width,height:asset.height,bytes:asset.bytes,
    uploadStatus:asset.uploadStatus||'pending',storageKey:asset.storageKey||null,remoteUrl:asset.remoteUrl||null
  };
}
async function tryUploadPhotoAsset(asset){
  if(!asset||typeof asset==='string')return asset;
  const blob=asset._blob||photoBlobRegistry.get(asset.id);
  if(!blob)return asset;
  const token=localStorage.getItem(AUTH_LS);
  if(!token)return asset;
  try{
    const presignRes=await fetch(apiUrl('/api/photos/presign'),{
      method:'POST',
      headers:{'Content-Type':'application/json',Authorization:'Bearer '+token},
      body:JSON.stringify({id:asset.id,mime:asset.mime,bytes:asset.bytes})
    });
    if(!presignRes.ok)return asset;
    const presign=await presignRes.json();
    if(!presign.configured||!presign.uploadUrl){
      asset.uploadStatus=presign.mode==='deferred'?'pending':'pending';
      return asset;
    }
    const putRes=await fetch(presign.uploadUrl,{method:'PUT',body:blob,headers:{'Content-Type':asset.mime}});
    if(!putRes.ok)return asset;
    releasePhotoAsset(asset);
    asset.storageKey=presign.storageKey;
    asset.remoteUrl=presign.publicUrl;
    asset.uploadStatus='uploaded';
    asset._blob=null;
    return asset;
  }catch(e){
    console.warn('[photo] upload deferred:',e);
    return asset;
  }
}
async function finalizePhotoAsset(asset){
  if(!asset)return null;
  if(typeof asset==='string')return asset;
  const uploaded=await tryUploadPhotoAsset(asset);
  return serializePhotoAsset(uploaded);
}
async function captureTimeBoxFrame(video){
  const vw=video.videoWidth,vh=video.videoHeight;
  if(!vw||!vh)return null;
  const {w,h}=fitPhotoExportSize(vw,vh);
  const off=document.createElement('canvas');
  off.width=w;off.height=h;
  const ctx=off.getContext('2d');
  ctx.imageSmoothingEnabled=true;
  ctx.drawImage(video,0,0,w,h);
  try{
    const blob=await canvasToPhotoBlob(off);
    return createPhotoAsset(blob,w,h);
  }catch(_){return null;}
}
function paintTimeBoxPreview(canvas,imgSource){
  const vp=canvas?.parentElement;if(!vp||!imgSource)return;
  const cssW=vp.clientWidth,cssH=vp.clientHeight;
  if(!cssW||!cssH)return;
  const dpr=tboxDpr();
  canvas.width=Math.round(cssW*dpr);
  canvas.height=Math.round(cssH*dpr);
  canvas.style.width=cssW+'px';
  canvas.style.height=cssH+'px';
  const ctx=canvas.getContext('2d');
  ctx.setTransform(1,0,0,1,0,0);
  ctx.imageSmoothingEnabled=true;
  const sw=imgSource.videoWidth||imgSource.naturalWidth||imgSource.width;
  const sh=imgSource.videoHeight||imgSource.naturalHeight||imgSource.height;
  if(!sw||!sh)return;
  const scale=Math.max(cssW/sw,cssH/sh);
  const dw=sw*scale*dpr,dh=sh*scale*dpr;
  const dx=(canvas.width-dw)/2,dy=(canvas.height-dh)/2;
  ctx.drawImage(imgSource,dx,dy,dw,dh);
}
function displayTimeBoxPhoto(canvas,src){
  const url=typeof src==='string'?src:photoDisplaySrc(src);
  if(!url)return;
  const img=new Image();
  img.onload=()=>paintTimeBoxPreview(canvas,img);
  img.src=url;
}
async function captureTimeBoxPhoto(){
  if(photoCritOnCooldown()||timeBoxInCaptureState())return;
  const v=$('#tboxVideo'),c=$('#tboxCanvas');

const LEDGER_COIN_REWARD=100;
const LEDGER_COIN_DAILY_CAP=8;
function resetPhotoRewardDailyIfNeeded(){
  const today=todayStr();

function grantPhotoReward(){
  resetPhotoRewardDailyIfNeeded();

    return {coinGain:0,coinCapped:true,rewardGranted:false};
  }

function recordTx({type,amount,category,note='',hasPhoto=false,photo=null,photoData=null}){
  type=(type==='income')?'income':'expense';
  const amt=Math.abs(parseInt(amount||0));
  if(!amt)return null;
  const cat=(CATS[type].find(c=>c[1]===category))?category:'其他';
  const resolvedPhotoData=photoData!=null&&photoData!==''?photoData:null;
  const photoReward=(hasPhoto||resolvedPhotoData)?grantPhotoReward():{coinGain:0,coinCapped:false,rewardGranted:false};
  const onCD=Date.now()-S.lastPhotoCrit<600000;
  const crit=(hasPhoto||resolvedPhotoData)&&photoReward.rewardGranted&&!onCD;
  const expGain=photoReward.rewardGranted?((crit?10:5)+(type==='income'?3:0)):0;
  S.tx.unshift({id:Date.now(),ts:new Date().toISOString(),type,category:cat,amount:amt,note:note||'',
    hasPhoto:!!(hasPhoto||resolvedPhotoData),photo,photoData:resolvedPhotoData,
    coinGain:photoReward.coinGain,expGain,crit,rewardGranted:photoReward.rewardGranted,coinCapped:photoReward.coinCapped});
  if(expGain>0)gainExp(expGain);
  if(crit)S.lastPhotoCrit=Date.now();
  S.pet.hunger=clamp(S.pet.hunger+8);
  S.pet.happiness=clamp(S.pet.happiness+(type==='income'?6:4)+(crit?25:0));
  if(type==='income')S.pet.health=clamp(S.pet.health+3);
  syncPetMoodState();
  updateStreak();
  if(typeof touchPetActivity==='function')touchPetActivity();
  if(isSleeping())wakeFromSleep();
  return {coinGain:photoReward.coinGain,coinCapped:photoReward.coinCapped,rewardGranted:photoReward.rewardGranted,expGain,crit,amt,type,cat};
}

function gainExp(x){
  S.pet.exp+=x;
  while(S.pet.exp>=lvlNeed(S.pet.level)){
    S.pet.exp-=lvlNeed(S.pet.level);S.pet.level++;
    if(S.pet.stage<4 && S.pet.level%3===0){S.pet.stage++;say(`✨進化！變成${STAGE_NM[S.pet.stage]}了！`);toast('🎉 寵物進化！');}
    else toast('⬆️ 升級 Lv.'+S.pet.level);
  }
}
function loseExp(x){ // 時空悖論降級
  S.pet.exp-=x;
  while(S.pet.exp<0 && S.pet.level>1){
    S.pet.level--;S.pet.exp+=lvlNeed(S.pet.level);
    if(S.pet.stage>2 && S.pet.level%3===2){S.pet.stage--;say('⏳時空悖論…我退化了…😿');toast('⚠️ 寵物降級！');}
  }
  if(S.pet.exp<0)S.pet.exp=0;
}

function advanceMktState(sm){
  if(!sm)return;
  sm.barCount=(sm.barCount||0)+1;
  if(sm.barsLeft<=0||(sm.barCount>=8&&Math.random()<0.4)){
    rollMktState(sm);
  }else sm.barsLeft--;
}
function genBarReturn(state,vol){
  const mag=vol.min+Math.random()*(vol.max-vol.min);
  if(state===MKT_STATE.CONSOL)return(Math.random()-0.5)*vol.max*0.55;
  if(state===MKT_STATE.BULL){
    const up=Math.random()<0.7;
    return up?mag:-mag*(0.25+Math.random()*0.35);
  }
  const dn=Math.random()<0.7;
  return dn?-mag:mag*(0.25+Math.random()*0.35);
}
function genBarOHLC(open,v,period,state){
  const vol=barVolRange(v,period);
  const r=genBarReturn(state,vol);
  const c=Math.max(0.5,open*(1+r));
  const top=Math.max(open,c),bot=Math.min(open,c);
  const wick=vol.max*(0.25+Math.random()*0.45);
  return{
    o:open,c,
    h:Math.max(top*(1+wick*0.35),top),
    l:Math.min(bot*(1-wick*0.35),bot)
  };
}
function rtM15Bucket(ts){return Math.floor(ts/(15*60*1000));}
function rtH1Bucket(ts){return Math.floor(ts/(60*60*1000));}
function rtD1Bucket(ts){const d=new Date(ts);d.setHours(0,0,0,0);return d.getTime();}
function rtBarTime(period,bucket){
  if(period==='m15')return bucket*15*60*1000;
  if(period==='h1')return bucket*3600*1000;
  return bucket;
}
function sortKlineBars(bars){
  return bars.slice().sort((a,b)=>(a.bucket??a.t)-(b.bucket??a.t));
}
function backfillRtBars(code,period,count,bucketFn){
  const v=VSTOCK(code),st=S.market.stocks[code];
  const cur=bucketFn(Date.now());
  const startBucket=cur-count+1;
  const sm={state:MKT_STATE.CONSOL,barsLeft:0,barCount:0};
  rollMktState(sm);
  const vol=barVolRange(v,period);
  let px=st.price*(1-(vol.max*count*0.35*(Math.random()-0.4)));
  px=Math.max(0.5,px);
  const bars=[];
  for(let i=0;i<count;i++){
    advanceMktState(sm);
    const bucket=startBucket+i;
    const bar=genBarOHLC(px,v,period,sm.state);
    bar.t=rtBarTime(period,bucket);
    bar.bucket=bucket;
    bars.push(bar);
    px=bar.c;
  }
  const target=st.price,last=bars[bars.length-1];
  if(last&&last.c>0){
    const ratio=target/last.c;
    bars.forEach(b=>{b.o*=ratio;b.h*=ratio;b.l*=ratio;b.c*=ratio;});
  }
  if(!st.mktState)initMktState(st);
  st.mktState=sm;
  return sortKlineBars(bars);
}
function initStockKlines(code){
  const st=S.market.stocks[code];
  if(!st)return;
  const now=Date.now();
  if(!st.mktState)initMktState(st);
  st.kline={
    m15:{bars:backfillRtBars(code,'m15',WAR_KLINE_COUNTS.m15,rtM15Bucket),lastBucket:rtM15Bucket(now)},
    h1:{bars:backfillRtBars(code,'h1',WAR_KLINE_COUNTS.h1,rtH1Bucket),lastBucket:rtH1Bucket(now)},
    d1:{bars:backfillRtBars(code,'d1',WAR_KLINE_COUNTS.d1,rtD1Bucket),lastBucket:rtD1Bucket(now)}
  };
}
function maybeUpdateRegime(st,v){
  if(st.regime!=='normal'){if(--st.dleft<=0)st.regime='normal';}
  else{
    const r=Math.random();
    if(r<v.boom*0.008){st.regime='boom';st.dleft=2+((Math.random()*2)|0);}
    else if(r<v.boom*0.012){st.regime='crash';st.dleft=2+((Math.random()*2)|0);}
  }
}
function syncStockKlinePeriod(st,code,period,maxBars,bucketFn){
  if(!st.kline)initStockKlines(code);
  const kl=st.kline[period];
  const price=st.price,now=Date.now(),bucket=bucketFn(now);
  if(!kl.bars.length){
    kl.bars.push({o:price,h:price,l:price,c:price,t:rtBarTime(period,bucket),bucket});
    kl.lastBucket=bucket;return;
  }
  kl.bars=sortKlineBars(kl.bars);
  const last=kl.bars[kl.bars.length-1];
  if(bucket>kl.lastBucket){
    last.c=price;last.h=Math.max(last.h,price);last.l=Math.min(last.l,price);
    advanceMktState(st.mktState);
    kl.bars.push({o:price,h:price,l:price,c:price,t:rtBarTime(period,bucket),bucket});
    kl.lastBucket=bucket;
    while(kl.bars.length>maxBars)kl.bars.shift();
    kl.bars=sortKlineBars(kl.bars);
    if(period==='h1')maybeUpdateRegime(st,VSTOCK(code));
    if(period==='d1')st.sessionOpen=price;
  }else{
    last.c=price;last.h=Math.max(last.h,price);last.l=Math.min(last.l,price);
  }
}
function syncAllStockKlines(){
  if(!S.market)return;
  VSTOCKS.forEach(v=>{
    const st=S.market.stocks[v.c];
    syncStockKlinePeriod(st,v.c,'m15',WAR_KLINE_COUNTS.m15,rtM15Bucket);
    syncStockKlinePeriod(st,v.c,'h1',WAR_KLINE_COUNTS.h1,rtH1Bucket);
    syncStockKlinePeriod(st,v.c,'d1',WAR_KLINE_COUNTS.d1,rtD1Bucket);
  });
}
function genSecondReturn(st,v){
  if(!st.mktState)initMktState(st);
  const sm=st.mktState,vol=barVolRange(v,'m15');
  const secMag=(vol.min+vol.max)*0.5/45;
  if(sm.state===MKT_STATE.CONSOL)return(Math.random()-0.5)*secMag*0.6;
  if(sm.state===MKT_STATE.BULL)return(Math.random()<0.58?1:-0.35)*secMag*(0.6+Math.random()*0.8);
  return(Math.random()<0.58?-1:0.35)*secMag*(0.6+Math.random()*0.8);
}
function tickMarketSecond(){
  const m=S.market;
  const mSig=0.12/Math.sqrt(SEC_PER_YEAR);
  const rM=mSig*gauss();
  m.M=Math.max(1,m.M*(1+rM));m.rM=rM;
  VSTOCKS.forEach(v=>{
    const st=m.stocks[v.c];
    if(!st.mktState)initMktState(st);
    let r=genSecondReturn(st,v);
    if(v.special==='anti')r-=0.00002;
    if(st.regime==='boom')r+=barVolRange(v,'m15').max/120;
    else if(st.regime==='crash')r-=barVolRange(v,'m15').max/120;
    if(v.special==='ponzi'&&st.regime==='boom'&&Math.random()<0.00005){r=-0.004;st.regime='crash';st.dleft=2;}
    r=Math.max(-0.012,Math.min(0.012,r));
    st.price=Math.max(0.5,st.price*(1+r));
    st.lastRet=r;
    st.mu=r;
    const d1b=rtD1Bucket(Date.now());
    if(!st._d1b){st._d1b=d1b;st.sessionOpen=st.price;}
    if(d1b>st._d1b){st._d1b=d1b;st.sessionOpen=st.price;}
    st.ret.push(r);if(st.ret.length>120)st.ret.shift();
  });
  syncAllStockKlines();
  computeNews();
}
function ensureMarketTick(){
  if(!S.market||!S.market.stocks)initMarket();
  if(!S.market.klineVer||S.market.klineVer<2){
    VSTOCKS.forEach(v=>{const st=S.market.stocks[v.c];initMktState(st);initStockKlines(v.c);});
    S.market.klineVer=2;
  }
  const now=Date.now();
  let elapsed=Math.floor((now-(S.market.lastSecTick||now))/1000);
  if(elapsed<1)return;
  if(elapsed>30)elapsed=30;
  for(let i=0;i<elapsed;i++)tickMarketSecond();
  S.market.lastSecTick=now;
}

function getLatestKlineBar(st,period){
  const kl=st?.kline?.[period];

  if(kl.lastBucket!=null){
    const hit=kl.bars.find(b=>(b.bucket??b.t)===kl.lastBucket);
    if(hit)return hit;
  }

function stepWarKlineLivePrice(){
  const code=warDraft.code;
  const st=S.market?.stocks?.[code];
  const v=VSTOCK(code);
  if(!st||!v)return null;
  if(!st.kline)initStockKlines(code);
  const m15=st.kline.m15?.bars;
  if(!m15?.length)return st.price;
  const last=m15[m15.length-1];
  const sm=st.mktState;
  const vol=barVolRange(v,'m15');
  let bias=0;
  if(sm?.state===MKT_STATE.BULL)bias=0.14;
  else if(sm?.state===MKT_STATE.BEAR)bias=-0.14;
  const rTick=(Math.random()-0.5+bias)*(vol.min+vol.max)*0.16;
  const newPrice=Math.max(0.5,last.c*(1+rTick));
  last.c=newPrice;
  last.h=Math.max(last.h,newPrice,last.o);
  last.l=Math.min(last.l,newPrice,last.o);
  st.price=newPrice;
  st.lastRet=rTick;

function warKlineChartWidth(n,viewportW){
  return Math.max(viewportW||280,n*WAR_KLINE_BAR_PITCH+WAR_KLINE_PAD.l+WAR_KLINE_PAD.r);
}
function warKlineYOf(v,lo,range,ch,padT){
  return padT+ch-((v-lo)/range)*ch;
}
function renderWarKlineYaxis(plotH,hi,lo,range,pad,lastCandle){
  const el=$('#warKlineYaxis');
  if(!el||!lastCandle)return;
  const ch=plotH-pad.t-pad.b;
  const yOf=v=>warKlineYOf(v,lo,range,ch,pad.t);
  const lastY=yOf(lastCandle.c);
  const tickUp=warKlineFlash==='up',tickDn=warKlineFlash==='dn';
  const badgeUp=tickUp||(!tickDn&&lastCandle.c>=lastCandle.o);
  const flashCls=tickUp?' y-flash-up':tickDn?' y-flash-dn':'';
  const badgeH=16;
  const ymin=pad.t+badgeH/2+2;
  const ymax=plotH-pad.b-badgeH/2-2;
  const clampY=y=>Math.max(ymin,Math.min(ymax,y));
  const ticks=[hi,(hi+lo)/2,lo];
  const minGap=16;
  const placed=[];
  let html='';
  ticks.forEach((v,i)=>{
    const y=yOf(v);
    if(i===ticks.length-1&&y>ymax-badgeH)return;
    if(placed.some(py=>Math.abs(py-y)<minGap))return;
    if(Math.abs(y-lastY)<minGap)return;
    placed.push(y);
    html+=`<span class="y-tick" style="top:${y}px">${v.toFixed(2)}</span>`;
  });
  html+=`<span class="y-last ${badgeUp?'up':'dn'}${flashCls}" style="top:${clampY(lastY)}px">$${lastCandle.c.toFixed(2)}</span>`;
  el.innerHTML=html;
}
function renderWarKlineXaxis(chartW,pad,n){
  const el=$('#warKlineXaxis');
  if(!el||!warKlineCandles?.length)return;
  const step=warKlineXLabelStep(warKlinePeriod,n);
  let html='';
  for(let i=0;i<n;i+=step){
    const x=pad.l+WAR_KLINE_BAR_GAP+i*WAR_KLINE_BAR_PITCH+WAR_KLINE_BAR_W/2;
    const lb=getRealTimeLabel(i,warKlinePeriod,warKlineCandles);
    html+=`<span class="x-tick" style="left:${x}px">${lb}</span>`;
  }
  el.style.width=chartW+'px';
  el.innerHTML=html;
}
function scrollWarKlineToEnd(){
  const el=$('#warKlineScroll');
  if(!el||warKlineUserScrolled)return;
  el.scrollLeft=el.scrollWidth-el.clientWidth;
}
function drawWarKline(){
  const canvas=$('#warKlineCanvas');
  const scroll=$('#warKlineScroll');
  const inner=$('#warKlineScrollInner');
  if(!canvas||!scroll||!inner||!warKlineCandles?.length)return;
  warKlineCandles=validateKlineTimestamps(sortKlineBars(warKlineCandles),warKlinePeriod);
  const viewportW=scroll.clientWidth||280;
  const plotH=Math.max(100,scroll.clientHeight-28);
  const n=warKlineCandles.length;
  const pad={...WAR_KLINE_PAD};
  const chartW=warKlineChartWidth(n,viewportW);
  inner.style.width=chartW+'px';
  inner.style.height=plotH+28+'px';
  const dpr=Math.min(window.devicePixelRatio||1,2);
  canvas.width=Math.floor(chartW*dpr);
  canvas.height=Math.floor(plotH*dpr);
  canvas.style.width=chartW+'px';
  canvas.style.height=plotH+'px';
  const ctx=canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,chartW,plotH);
  const cw=chartW-pad.l-pad.r,ch=plotH-pad.t-pad.b;
  let hi=-Infinity,lo=Infinity;
  warKlineCandles.forEach(c=>{hi=Math.max(hi,c.h);lo=Math.min(lo,c.l);});
  const range=Math.max(hi-lo,hi*0.002);
  const yOf=v=>warKlineYOf(v,lo,range,ch,pad.t);
  ctx.strokeStyle='rgba(90,74,106,.12)';ctx.lineWidth=1;
  for(let g=0;g<4;g++){
    const gy=pad.t+ch*g/3;
    ctx.beginPath();ctx.moveTo(pad.l,gy);ctx.lineTo(chartW-pad.r,gy);ctx.stroke();
  }
  warKlineCandles.forEach((c,i)=>{
    const x=pad.l+WAR_KLINE_BAR_GAP+i*WAR_KLINE_BAR_PITCH+WAR_KLINE_BAR_W/2;
    const up=c.c>=c.o;
    const col=up?'#e05a5a':'#3f9e4d';
    const yH=yOf(c.h),yL=yOf(c.l),yO=yOf(c.o),yC=yOf(c.c);
    ctx.strokeStyle=col;ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(x,yH);ctx.lineTo(x,yL);ctx.stroke();
    const top=Math.min(yO,yC),bot=Math.max(yO,yC),bodyH=Math.max(2,bot-top);
    ctx.fillStyle=col;ctx.fillRect(x-WAR_KLINE_BAR_W/2,top,WAR_KLINE_BAR_W,bodyH);
  });
  const last=warKlineCandles[warKlineCandles.length-1];
  renderWarKlineYaxis(plotH,hi,lo,range,pad,last);
  renderWarKlineXaxis(chartW,pad,n);
  requestAnimationFrame(scrollWarKlineToEnd);
}

function recallArmySettlement(a){
  updateArmyFromPrice(a);
  const v=VSTOCK(a.code), u=WUNIT(a.unit);
  const dir=u.id==='long'?1:-1;
  if(v&&(S.market.battles<3||S.market.lossStreak>=3)){
    const need=dir*v.s*25.33;
    a.settledPct=+(a.settledPct*0.4+need*0.6).toFixed(2);
  }
  a.displayPct=a.settledPct;
  a.result=a.settledPct;
  const win=a.settledPct>=0;
  a.status=win?'win':'lose';
  const r=a.settledPct/100;
  let count=a.count;
  if(u.id==='long')count=Math.max(0,Math.round(count*(1+u.k*r)));
  else count=Math.max(0,Math.round(count*(1-u.k*r)));
  a.value=Math.round(count*46);
  a.pnl=a.value-a.cost;
  return{win,move:a.settledPct};
}
function deploy(){
  maybeAdvanceMarket();
  const count=commitWarCountFromInput();
  warDraft.count=count;
  const u=WUNIT(warDraft.unit), cost=u.cost*count;
  if(S.wallet.coins<cost){toast('代幣不足');warDraft.count=warMaxAffordCount();warDraft.countInput=null;updateWarDeployUi();return;}
  const v=VSTOCK(warDraft.code);
  const st=S.market.stocks[v.c];
  S.wallet.coins-=cost;
  const a={
    id:Date.now(),unit:u.id,code:v.c,name:v.n,count:count,cost,
    live:true,settledPct:0,tickNoise:0,displayPct:0,prevDisplayPct:0,
    sparkline:[0],flash:null,deployPrice:st.price,
    value:cost,result:0,pnl:0,status:'win'
  };
  S.army.unshift(a);
  startWarTicker();
  toast(`⚔️ ${u.nm} 已出征・${v.n}`);
  renderAll();switchTab('war');
}
function recall(id){
  const i=S.army.findIndex(a=>a.id===id);if(i<0)return;
  const a=S.army[i];
  const u=WUNIT(a.unit)||{nm:a.unit};
  let move=a.result||0,pnl=a.pnl||0,win=a.status==='win';
  if(a.live){
    const settled=recallArmySettlement(a);
    move=settled.move;win=settled.win;pnl=a.pnl;
    a.live=false;
    S.market.battles++;S.market.lossStreak=win?0:(S.market.lossStreak+1);
    S.battleLog.unshift({ts:Date.now(),unit:u.nm,ticker:a.code,move,pnl});
    if(win){S.pet.happiness=clamp(S.pet.happiness+8);say(pick(LINES.win));}
    else{S.pet.health=clamp(S.pet.health-8);say(pick(LINES.lose));}
  }
  const back=a.value||0;
  S.wallet.coins+=back;S.army.splice(i,1);
  if(!hasLiveArmy())stopWarTicker();
  toast(`召回！換回 ${fmt(back)}${coinIc(true)}`);
  if(back>a.cost)gainExp(4);

const STATS_PIE_COLORS={
  '飲食':'#F5C6A8','交通':'#A8D4F0','購物':'#D4B8F0','居住':'#B8E8C8',
  '娛樂':'#F0B8C8','醫療':'#F0A8C0','學習':'#A8E0E8','投資':'#F0E8B0','其他':'#C8C8D8'
};
let statsHighlightCat=null;
function statsMonthData(){
  const m=todayStr().slice(0,7);
  const byCat={};
  let exp=0,inc=0;
  S.tx.forEach(t=>{
    if(t.ts.slice(0,7)!==m)return;
    if(t.type==='expense'){byCat[t.category]=(byCat[t.category]||0)+t.amount;exp+=t.amount;}
    else inc+=t.amount;
  });
  const cats=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const rate=inc>0?Math.max(0,Math.round((inc-exp)/inc*100)):0;
  const catBudget=Math.max(1,Math.round(S.budget/CATS.expense.length));
  return{cats,exp,inc,rate,catBudget};
}
function statsPieColor(cat){return STATS_PIE_COLORS[cat]||STATS_PIE_COLORS['其他'];}
function statsPctShare(val,total){
  if(!val||val<=0||!total||total<=0)return '0.0%';
  let pct=val/total*100;
  if(pct>0&&pct<0.05)pct=0.1;
  return pct.toFixed(1)+'%';
}
function buildStatsPieSvg(cats,totalExp,highlightCat){
  const list=cats.filter(([,v])=>v>0);
  if(!list.length)return '<div class="fin-stats-pie-empty">尚無支出</div>';
  const vb=224,cx=112,cy=112,R=102,r0=64,explode=9;
  // 單一分類 → 完整圓環（避免退化弧線）
  if(list.length===1){
    const [cat,val]=list[0];
    const on=highlightCat===cat;
    const ring=`M ${cx-R} ${cy} A ${R} ${R} 0 1 0 ${cx+R} ${cy} A ${R} ${R} 0 1 0 ${cx-R} ${cy} Z `+
               `M ${cx-r0} ${cy} A ${r0} ${r0} 0 1 1 ${cx+r0} ${cy} A ${r0} ${r0} 0 1 1 ${cx-r0} ${cy} Z`;
    const slice=`<g class="fin-stats-pie-slice${on?' on':''}" data-cat="${esc(cat)}" style="--explode-x:0px;--explode-y:0px"><path fill-rule="evenodd" d="${ring}" fill="${statsPieColor(cat)}"/></g>`;
    return `<svg class="fin-stats-pie-svg" viewBox="0 0 ${vb} ${vb}" role="img" aria-label="本月支出圓餅圖">${slice}</svg>`;
  }
  let angle=-Math.PI/2;
  const slices=[];
  list.forEach(([cat,val])=>{
    const frac=totalExp>0?val/totalExp:0;
    if(frac<=0)return;
    const a2=angle+frac*Math.PI*2;
    const mid=angle+(a2-angle)/2;
    const large=frac>0.5?1:0;
    const xo1=(cx+R*Math.cos(angle)).toFixed(2),yo1=(cy+R*Math.sin(angle)).toFixed(2);
    const xo2=(cx+R*Math.cos(a2)).toFixed(2),yo2=(cy+R*Math.sin(a2)).toFixed(2);
    const xi2=(cx+r0*Math.cos(a2)).toFixed(2),yi2=(cy+r0*Math.sin(a2)).toFixed(2);
    const xi1=(cx+r0*Math.cos(angle)).toFixed(2),yi1=(cy+r0*Math.sin(angle)).toFixed(2);
    const d=`M ${xo1} ${yo1} A ${R} ${R} 0 ${large} 1 ${xo2} ${yo2} L ${xi2} ${yi2} A ${r0} ${r0} 0 ${large} 0 ${xi1} ${yi1} Z`;
    const on=highlightCat===cat;
    const ex=(Math.cos(mid)*explode).toFixed(2);
    const ey=(Math.sin(mid)*explode).toFixed(2);
    slices.push(`<g class="fin-stats-pie-slice${on?' on':''}" data-cat="${esc(cat)}" style="--explode-x:${ex}px;--explode-y:${ey}px"><path d="${d}" fill="${statsPieColor(cat)}"/></g>`);
    angle=a2;
  });
  return `<svg class="fin-stats-pie-svg" viewBox="0 0 ${vb} ${vb}" role="img" aria-label="本月支出圓餅圖">${slices.join('')}</svg>`;
}
function statsListCategories(cats){
  const byCat=Object.fromEntries(cats);
  return CATS.expense.map(([,name])=>({name,val:byCat[name]||0}))
    .sort((a,b)=>b.val-a.val);
}
function renderStatsLegend(cats,totalExp,catBudget,highlightCat){
  const items=statsListCategories(cats).filter(({val})=>val>0);
  if(!items.length)return '<div class="fin-stats-legend-empty">尚無支出紀錄</div>';
  return `<div class="fin-stats-legend">${items.map(({name,val},idx)=>{
    const pct=statsPctShare(val,totalExp);
    const warn=val>0&&val/catBudget>=.8;
    const on=highlightCat===name?' on':'';
    const lead=idx===0?' lead':'';
    const color=statsPieColor(name);
    return `<div class="fin-stats-legend-row${lead}${on}${warn?' warn':''}" data-cat="${esc(name)}" data-amt="$${fmt(val)}" data-pct="${pct}" style="--row-color:${color}" role="button" tabindex="0">
      <span class="fin-stats-legend-left">
        <span class="fin-stats-legend-swatch" style="background:${color}"></span>
        <span class="fin-stats-legend-name">${catIcon(name,'')}<span>${esc(name)}</span></span>
      </span>
      <span class="fin-stats-legend-right">
        <span class="fin-stats-legend-pct">${pct}</span>
        <span class="fin-stats-legend-amt">$${fmt(val)}</span>
      </span>
      <span class="fin-stats-legend-chev" aria-hidden="true">&gt;</span>
    </div>`;
  }).join('')}</div>`;
}
function applyStatsHighlight(cat){
  statsHighlightCat=cat;
  document.querySelectorAll('.fin-stats-pie-slice').forEach(el=>{
    el.classList.toggle('on',!!cat&&el.dataset.cat===cat);
  });
  let matched=null;
  document.querySelectorAll('.fin-stats-legend-row').forEach(el=>{
    const on=!!cat&&el.dataset.cat===cat;
    el.classList.toggle('on',on);
    if(on)matched=el;
  });
  const center=document.getElementById('statsDonutCenter');
  if(center){
    const lab=center.querySelector('.dc-label');
    const amt=center.querySelector('.dc-amt');
    const sub=center.querySelector('.dc-sub');
    if(cat&&matched){
      if(lab)lab.textContent=cat;
      if(amt)amt.textContent=matched.dataset.amt||'';
      if(sub)sub.textContent=matched.dataset.pct||'';
      center.classList.add('is-cat');
      center.style.setProperty('--dc-accent',statsPieColor(cat));
    }else{
      if(lab)lab.textContent='本月總支出';
      if(amt)amt.textContent=center.dataset.total||'';
      if(sub)sub.textContent='';
      center.classList.remove('is-cat');
      center.style.removeProperty('--dc-accent');
    }
  }
}
function renderStatsCorePanel(cats,exp,catBudget,highlightCat){
  const hasExp=cats.filter(([,v])=>v>0).length>0;
  const pieHtml=hasExp?buildStatsPieSvg(cats,exp,highlightCat):'<div class="fin-stats-pie-empty">尚無支出</div>';

function wireStatsInteractions(){

function fitStatsKpiIncome(){

function decay(){
  const last=S._lastDecay||Date.now();
  const hrs=(Date.now()-last)/3600000;
  if(hrs>=1){
    const d=Math.floor(hrs);
    S.pet.hunger=clamp(S.pet.hunger-d*3);
    S.pet.happiness=clamp(S.pet.happiness-d*2);
    if(S.pet.hunger<20)S.pet.health=clamp(S.pet.health-d*2);
    S._lastDecay=Date.now();
    if(S.pet.hunger<30)say(pick(LINES.hungry));
  }
}

// 解析聊天裡的隱藏記帳指令 <<LOG {...}>>，真正寫入帳本
function applyChatLog(text){
  const m=text.match(/<<\s*LOG\s*(\{[\s\S]*?\})\s*>>/i);
  if(!m)return {clean:text,tx:null};
  const clean=text.replace(m[0],'').trim();
  try{
    const o=JSON.parse(m[1]);
    const r=recordTx({type:o.type,amount:o.amount,category:o.category,note:o.note||'（聊天記帳）'});
    if(r)return {clean,tx:r};
  }catch(e){}
  return {clean,tx:null};
}
function getPetReply(text){
  // 一律嘗試呼叫後端；若後端未啟動（如以 file:// 開啟）或連線失敗，靜默退回內建台詞
  return callGemini(text).catch(()=>cannedReply(text));
}
function cannedReply(text){
  const p=S.pet;
  if(/超支|沒錢|花太多|破產/.test(text))return petMoodDialogue(moodValue())||pick(LINES.over);
  if(/存|省|儲蓄|預算/.test(text))return petMoodDialogue(moodValue())||pick(LINES.save);
  if(/股|投資|買|賣|大盤|聖戰|小兵/.test(text))return '前線的事交給小兵們～不過記得，我只是模擬，別把戰場當真喔⚔️';
  if(/餓|吃|飯/.test(text))return pick(LINES.hungry);
  if(p.happiness>70)return petMoodDialogue()||pick(LINES.happy);
  return petMoodDialogue()||pick(LINES.idle);
}
function petSystemPrompt(){

  `- 不要出戲、不要長篇大論、不要用條列。\n`+

// 前端只呼叫本機後端 /api/chat；金鑰放在後端 .env，不會出現在前端
async function callGemini(text){
  // 只送最近 10 則「純對話」給模型（排除記帳收據等系統訊息），控制 token 成本
  const history=S.chat.filter(m=>m.r==='pet'||m.r==='me').slice(-10).map(m=>({role:m.r==='pet'?'model':'user',parts:[{text:m.t}]}));
  const body={
    systemInstruction:{parts:[{text:petSystemPrompt()}]},
    contents:[...history,{role:'user',parts:[{text}]}],
    generationConfig:{temperature:0.9,maxOutputTokens:1024,topP:0.95}
  };
  const res=await fetch(apiUrl('/api/chat'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const data=await res.json().catch(()=>({}));
  if(!res.ok||data.error){
    if(res.status===405){
      return '（守護靈還沒連上線 💤）請用「啟動遊戲.command」或 npm start 啟動 Node 後端（勿用靜態檔案伺服器開啟）';
    }
    const errMsg=String(data.error?.message||'');
    if(res.status===503||/high demand|unavailable|try again/i.test(errMsg)){
      return '（守護靈暫時忙碌中 💤）伺服器已自動重試，請稍候再傳一次訊息～';
    }
    const msg=errMsg||('HTTP '+res.status);
    return `（守護靈還沒連上線 💤）${msg}`;
  }
  const t=data?.candidates?.[0]?.content?.parts?.map(p=>p.text).join('')||'';
  return t.trim()||pick(LINES.idle);
}

const ZODIAC_NAMES=['鼠','牛','虎','兔','龍','蛇','馬','羊','猴','雞','狗','豬'];
function zodiacIndexFromYear(y){return ((y-4)%12+12)%12;}
let onboardZodiac=null;
let bdayDraft={year:'2000',month:'1',day:'1'};
const BDAY_MIN_YEAR=1990;
const BDAY_ITEM_H=40;
const BDAY_WHEEL_PAD=2;
function bdayDaysInMonth(y,m){
  if(!y||!m)return 31;
  return new Date(y,m,0).getDate();
}
function bdayWheelValues(part){
  const nowY=new Date().getFullYear();
  if(part==='year'){
    const ys=[];
    for(let y=BDAY_MIN_YEAR;y<=nowY;y++)ys.push(String(y));
    return ys;
  }
  if(part==='month')return Array.from({length:12},(_,i)=>String(i+1));
  const y=+(bdayDraft.year||2000),mo=+(bdayDraft.month||1);
  const maxD=bdayDaysInMonth(y,mo);
  return Array.from({length:maxD},(_,i)=>String(i+1));
}
function bdayWheelItemsHtml(values,selected){
  const sp='<li class="bday-wheel-item bday-wheel-spacer" aria-hidden="true"></li>';
  const pad=sp.repeat(BDAY_WHEEL_PAD);
  const body=values.map(v=>{
    const on=v===String(selected)?' on':'';
    return `<li class="bday-wheel-item${on}" data-val="${v}">${v}</li>`;
  }).join('');
  return pad+body+pad;
}
function updateBdayWheelVisual(el){
  if(!el)return;
  const idx=Math.round(el.scrollTop/BDAY_ITEM_H);
  el.querySelectorAll('.bday-wheel-item:not(.bday-wheel-spacer)').forEach((li,i)=>{
    const dist=Math.abs(i-idx);
    li.classList.toggle('on',dist===0);
    li.classList.toggle('near',dist===1);
    if(dist>1)li.style.opacity='.32';
    else li.style.opacity='';
  });
}
function scrollBdayWheelTo(el,val){
  if(!el)return;
  const items=[...el.querySelectorAll('.bday-wheel-item:not(.bday-wheel-spacer)')];
  const idx=items.findIndex(li=>li.dataset.val===String(val));
  if(idx>=0){
    el.scrollTop=idx*BDAY_ITEM_H;
    updateBdayWheelVisual(el);
  }
}
function syncBdayWheelPart(el,part){
  if(!el)return;
  const items=[...el.querySelectorAll('.bday-wheel-item:not(.bday-wheel-spacer)')];
  if(!items.length)return;
  const idx=Math.max(0,Math.min(Math.round(el.scrollTop/BDAY_ITEM_H),items.length-1));
  const val=items[idx]?.dataset.val;
  if(!val)return;
  if(part==='year')bdayDraft.year=val;
  else if(part==='month')bdayDraft.month=val;
  else bdayDraft.day=val;
}
function finishBdayWheelScroll(el,part){
  if(!el)return;
  const items=[...el.querySelectorAll('.bday-wheel-item:not(.bday-wheel-spacer)')];
  if(!items.length)return;
  const idx=Math.max(0,Math.min(Math.round(el.scrollTop/BDAY_ITEM_H),items.length-1));
  el.scrollTo({top:idx*BDAY_ITEM_H,behavior:'smooth'});
  syncBdayWheelPart(el,part);
  updateBdayWheelVisual(el);
  if(part==='year'||part==='month')refreshBdayDayWheel();
  updateBdayHint();
}
function bindBdayWheel(el,part){
  if(!el||el.dataset.bdayBound)return;
  el.dataset.bdayBound='1';
  let snapTimer;
  el.addEventListener('scroll',()=>{
    updateBdayWheelVisual(el);
    clearTimeout(snapTimer);
    snapTimer=setTimeout(()=>finishBdayWheelScroll(el,part),90);
  },{passive:true});
  el.addEventListener('click',e=>{
    const li=e.target.closest('.bday-wheel-item:not(.bday-wheel-spacer)');
    if(!li)return;
    const items=[...el.querySelectorAll('.bday-wheel-item:not(.bday-wheel-spacer)')];
    const idx=items.indexOf(li);
    if(idx>=0)el.scrollTo({top:idx*BDAY_ITEM_H,behavior:'smooth'});
  });
}
function refreshBdayDayWheel(){
  const dEl=$('#bdayWheelD');
  if(!dEl)return;
  const y=+(bdayDraft.year||2000),mo=+(bdayDraft.month||1);
  const maxD=bdayDaysInMonth(y,mo);
  let da=+(bdayDraft.day||1);
  if(da>maxD){da=maxD;bdayDraft.day=String(da);}
  dEl.innerHTML=bdayWheelItemsHtml(bdayWheelValues('day'),bdayDraft.day);
  requestAnimationFrame(()=>scrollBdayWheelTo(dEl,bdayDraft.day));
}
function syncBdayFromWheels(){
  syncBdayWheelPart($('#bdayWheelY'),'year');
  syncBdayWheelPart($('#bdayWheelM'),'month');
  syncBdayWheelPart($('#bdayWheelD'),'day');
}
function initBdayWheels(){
  const nowY=new Date().getFullYear();
  let y=+(bdayDraft.year||2000);
  if(y<BDAY_MIN_YEAR)y=BDAY_MIN_YEAR;
  if(y>nowY)y=nowY;
  bdayDraft.year=String(y);
  bdayDraft.month=String(Math.max(1,Math.min(12,+(bdayDraft.month||1))));
  const maxD=bdayDaysInMonth(y,+(bdayDraft.month));
  bdayDraft.day=String(Math.max(1,Math.min(maxD,+(bdayDraft.day||1))));
  const yEl=$('#bdayWheelY'),mEl=$('#bdayWheelM'),dEl=$('#bdayWheelD');
  if(!yEl||!mEl||!dEl)return;
  yEl.innerHTML=bdayWheelItemsHtml(bdayWheelValues('year'),bdayDraft.year);
  mEl.innerHTML=bdayWheelItemsHtml(bdayWheelValues('month'),bdayDraft.month);
  dEl.innerHTML=bdayWheelItemsHtml(bdayWheelValues('day'),bdayDraft.day);
  bindBdayWheel(yEl,'year');
  bindBdayWheel(mEl,'month');
  bindBdayWheel(dEl,'day');
  requestAnimationFrame(()=>{
    scrollBdayWheelTo(yEl,bdayDraft.year);
    scrollBdayWheelTo(mEl,bdayDraft.month);
    scrollBdayWheelTo(dEl,bdayDraft.day);
    updateBdayHint();
  });
}
function getBdayParts(){
  const y=+(bdayDraft.year||0);
  const mo=+(bdayDraft.month||0);
  const da=+(bdayDraft.day||0);
  if(!y||!mo||!da)return null;
  const d=new Date(y,mo-1,da);
  if(d.getFullYear()!==y||d.getMonth()!==mo-1||d.getDate()!==da)return null;
  if(y<BDAY_MIN_YEAR||d>new Date())return null;
  return d;
}

let _weatherCls='sunny';
const SKY_EDGE_BG={day:'#5db8ff',dawn:'#7fa8d8',dusk:'#ff9e6d',night:'#141a3a'};
function timeOfDay(d=new Date()){
  const h=d.getHours()+d.getMinutes()/60;
  if(h>=5&&h<8)return'dawn';
  if(h>=8&&h<17)return'day';
  if(h>=17&&h<19)return'dusk';
  return'night';
}
function getEffectiveTod(d=new Date()){
  const mode=S.theme?.mode||'auto';
  if(mode==='day')return'day';
  if(mode==='night')return'night';
  return timeOfDay(d);
}
function isDarkSky(tod){return tod==='night'||tod==='dusk';}
function applySkyChrome(){
  const tod=getEffectiveTod();
  const pageBg=$('#pageBg'),sc=$('#scene'),app=$('#app');
  if(pageBg)pageBg.dataset.tod=tod;
  if(sc)sc.dataset.tod=tod;
  if(app){
    app.dataset.tod=tod;
    app.dataset.sky=isDarkSky(tod)?'dark':'light';
  }
  const edge=SKY_EDGE_BG[tod]||'#141a3a';
  document.body.style.background=edge;
  if(app)app.style.backgroundColor=edge;
}
function refreshSky(){
  applySkyChrome();
  const tod=getEffectiveTod();
  const night=tod==='night',dusk=tod==='dusk',dawn=tod==='dawn';
  const mode=S.theme?.mode||'auto';
  let storm,cloudy,partly;
  if(mode==='night'){storm=true;cloudy=false;partly=false;}
  else if(mode==='day'){storm=false;cloudy=false;partly=false;}
  else{storm=_weatherCls==='storm';cloudy=_weatherCls==='cloudy';partly=_weatherCls==='partly';}
  let sunOp; if(night)sunOp=0; else if(dusk)sunOp=0.4; else if(dawn)sunOp=0.65;
  else sunOp=storm?0.15:cloudy?0.45:partly?0.7:1;
  const sun=$('#sun'); if(sun)sun.style.opacity=sunOp;
  const moon=$('#moon'); if(moon)moon.style.opacity=night?1:0;
  const stars=$('#stars'); if(stars)stars.style.opacity=night?1:0;
  const rain=$('#rain'); if(rain)rain.classList.toggle('on',storm);
  const clouds=$('#skyDecor'); if(clouds){
    clouds.querySelectorAll('.cloud').forEach(c=>{
      c.style.opacity=(mode==='night'||storm)?'0.35':(cloudy?'0.55':'0.9');
    });
  }
  if(night)maybeNightDoze();
}
function maybeNightDoze(){
  if(typeof startSleep!=='function'||document.hidden)return;
  if(performance.now()-(petAnim.lastUserAt||0)<20000)return; // 剛互動（走路/點擊）不馬上打瞌睡
  startSleep();
}
function scheduleTimeOfDay(){
  refreshSky();
  const now=new Date(),h=now.getHours()+now.getMinutes()/60;
  const bounds=[5,8,17,19,24];
  const nextH=bounds.find(b=>b>h)??24;
  const next=new Date(now); next.setHours(Math.floor(nextH),(nextH%1)*60,3,0);
  clearTimeout(window._todT);
  window._todT=setTimeout(scheduleTimeOfDay, Math.max(1000,next-now));
}
document.addEventListener('visibilitychange',()=>{ if(!document.hidden)refreshSky(); });

/* ===== 場景 Carousel（上方遊戲層左右滑，下方卡片固定）===== */
const SCENES=['kitchen','home','bedroom'];  // 飽食→左、心情→中、健康→右
const SceneCarousel={
  i:1,track:null,w:0,dragging:false,axis:null,startX:0,startY:0,baseX:0,_x:0,_raf:0,_swiped:false,
  init(){
    this.track=$('#sceneTrack'); const scene=$('#scene');
    if(!this.track||!scene)return;
    this.scene=scene;
    this._measure();
    this.track.addEventListener('pointerdown',e=>this.down(e));
    window.addEventListener('pointermove',e=>this.move(e),{passive:false});
    window.addEventListener('pointerup',()=>this.up());
    window.addEventListener('pointercancel',()=>this.up());
    window.addEventListener('resize',()=>{this._measure();this.snap(false);});
    this.snap(false);
  },
  // 重新量測場景寬度（登入後先切到聖戰分頁時可能量到 0；觸控/貼齊前重量才正確）
  _measure(){const w=this.scene?this.scene.clientWidth:0; if(w>0)this.w=w; return this.w;},
  go(name){const idx=SCENES.indexOf(name); if(idx<0)return; this.i=idx; this._measure(); this.snap(true);},
  down(e){this._measure();this.dragging=true;this.axis=null;this._swiped=false;
    this.startX=e.clientX;this.startY=e.clientY;this.baseX=-this.i*this.w;this.track.classList.add('dragging');},
  move(e){
    if(!this.dragging)return;
    const dx=e.clientX-this.startX,dy=e.clientY-this.startY;
    if(this.axis===null){
      // 位移未達 20px 一律視為「點擊」，放行給寵物移動；超過才鎖定手勢方向
      if(Math.abs(dx)<20&&Math.abs(dy)<20)return;
      this.axis=Math.abs(dx)>Math.abs(dy)?'x':'y';
      if(this.axis==='y'){this.dragging=false;this.track.classList.remove('dragging');return;}
      this._swiped=true; // 已確定是水平滑動 → 交給翻頁、阻擋寵物移動
    }
    e.preventDefault();
    let x=this.baseX+dx,min=-(SCENES.length-1)*this.w;
    if(x>0)x*=0.35; if(x<min)x=min+(x-min)*0.35;
    this._x=x;
    if(!this._raf)this._raf=requestAnimationFrame(()=>{this.track.style.transform=`translate3d(${this._x}px,0,0)`;this._raf=0;});
  },
  up(){
    if(!this.dragging)return; this.dragging=false;
    const moved=(this._x??this.baseX)-this.baseX;
    if(Math.abs(moved)>this.w*0.18)this.i+=moved<0?1:-1;
    this.i=Math.max(0,Math.min(SCENES.length-1,this.i));
    this.snap(true);
    setTimeout(()=>{this._swiped=false;},50);
  },
  snap(anim){
    if(!this.track)return;
    if(!this.w||this.w<=0)this._measure();
    this.track.classList.toggle('dragging',!anim);
    this._x=-this.i*this.w;
    this.track.style.transform=`translate3d(${this._x}px,0,0)`;
    document.querySelectorAll('#pageDots i').forEach((d,k)=>d.classList.toggle('on',k===this.i));
    const l=document.querySelector('.edge-hint.l'),r=document.querySelector('.edge-hint.r');
    if(l)l.classList.toggle('hide',this.i===0);
    if(r)r.classList.toggle('hide',this.i===SCENES.length-1);
    if(SCENES[this.i]!=='home'&&isOnUpperPlatform()){resetPetPlatform();setPetPos(petAnim.px,petAnim.py);}
    if(SCENES[this.i]==='kitchen')resetKitchenIdle();
    else if(tiger4Anim.kitchen.state!=='idle')resetKitchenIdle();
    updateFoodFab();
    if(!anim)requestAnimationFrame(()=>this.track.classList.remove('dragging'));
  }
};

_bootGameCore=function bootGameCore(){

(async function bootGame(){
  await resolveApiBase();
  const resuming=!!(localStorage.getItem(AUTH_LS)||localStorage.getItem(GUEST_LS)==='1');
  if(resuming)showAuthBootLoading();
  try{
    const authed=await initAuth();
    if(!authed)return;
    _bootGameCore();
  }finally{
    hideAuthBootLoading();
  }
})();
// 浮島碎念：寵物依當下狀態主動說話（用內建台詞，不呼叫 API、不花 token）
function contextualLine(){
  const p=S.pet, m=todayStr().slice(0,7); let exp=0;
  S.tx.forEach(t=>{if(t.ts.slice(0,7)===m&&t.type==='expense')exp+=t.amount;});
  if(isTigerSprite()&&isOnUpperPlatform()&&isMoodComfortable()){
    const platformLine=petPlatformDialogue();
    if(platformLine)return platformLine;
  }
  const moodLine=petMoodDialogue();
  if(p.hunger<30)return pick(LINES.hungry);
  if(exp>S.budget||p.health<30)return petMoodDialogue(Math.min(moodValue(),MOOD.LOW))||pick(LINES.over);
  if(exp>S.budget*0.75)return petMoodDialogue(MOOD.COMFORT)||'這個月快到預算上限囉，省著點花好嗎？🐾';
  if(moodLine)return moodLine;
  if(exp>0&&exp<S.budget*0.4)return pick(LINES.save);
  return pick(LINES.idle);
}
function proactiveChatter(){
  if($('#onboard').style.display!=='none')return; // 測驗/聊天/設定彈窗開著時不打擾
  if(document.hidden||S.pet.stage<2)return;
  say(contextualLine());
}
// 閒置碎念：對話框消失後 50~60 秒才會再主動說話
function scheduleChatter(){scheduleChatterAfterDismiss();}
