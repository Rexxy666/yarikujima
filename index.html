/* ===== 動態時區天空 ===== */
let _weatherCls='sunny';
function timeOfDay(d=new Date()){
  const h=d.getHours()+d.getMinutes()/60;
  if(h>=5&&h<8)return'dawn';
  if(h>=8&&h<17)return'day';
  if(h>=17&&h<19)return'dusk';
  return'night';
}
function refreshSky(){
  const tod=timeOfDay(),sc=$('#scene'); if(sc)sc.dataset.tod=tod;
  const night=tod==='night',dusk=tod==='dusk',dawn=tod==='dawn';
  const storm=_weatherCls==='storm',cloudy=_weatherCls==='cloudy',partly=_weatherCls==='partly';
  let sunOp; if(night)sunOp=0; else if(dusk)sunOp=0.4; else if(dawn)sunOp=0.65;
  else sunOp=storm?0.15:cloudy?0.45:partly?0.7:1;
  const sun=$('#sun'); if(sun)sun.style.opacity=sunOp;
  const moon=$('#moon'); if(moon)moon.style.opacity=night?1:0;
  const stars=$('#stars'); if(stars)stars.style.opacity=night?1:0;
  const rain=$('#rain'); if(rain)rain.classList.toggle('on',storm);
  if(night)maybeNightDoze();
}
function maybeNightDoze(){
  if(typeof startSleep!=='function'||document.hidden)return;
  if(performance.now()-(petAnim.lastUserAt||0)<20000)return; // 剛互動（走路/點擊）不馬上打瞌睡
  startSleep();
}
function scheduleTimeOfDay(){
  refreshSky();
  const now=new Date(),h=now.getHours()+now.getMinutes()/60;
  const bounds=[5,8,17,19,24];
  const nextH=bounds.find(b=>b>h)??24;
  const next=new Date(now); next.setHours(Math.floor(nextH),(nextH%1)*60,3,0);
  clearTimeout(window._todT);
  window._todT=setTimeout(scheduleTimeOfDay, Math.max(1000,next-now));
}
document.addEventListener('visibilitychange',()=>{ if(!document.hidden)refreshSky(); });

/* ===== 場景 Carousel（上方遊戲層左右滑，下方卡片固定）===== */
const SCENES=['kitchen','home','bedroom'];  // 飽食→左、心情→中、健康→右
const SceneCarousel={
  i:1,track:null,w:0,dragging:false,axis:null,startX:0,startY:0,baseX:0,_x:0,_raf:0,_swiped:false,
  init(){
    this.track=$('#sceneTrack'); const scene=$('#scene');
    if(!this.track||!scene)return;
    this.w=scene.clientWidth;
    this.track.addEventListener('pointerdown',e=>this.down(e));
    window.addEventListener('pointermove',e=>this.move(e),{passive:false});
    window.addEventListener('pointerup',()=>this.up());
    window.addEventListener('pointercancel',()=>this.up());
    window.addEventListener('resize',()=>{this.w=scene.clientWidth;this.snap(false);});
    this.snap(false);
  },
  go(name){const idx=SCENES.indexOf(name); if(idx<0)return; this.i=idx; this.snap(true);},
  down(e){this.dragging=true;this.axis=null;this._swiped=false;
    this.startX=e.clientX;this.startY=e.clientY;this.baseX=-this.i*this.w;this.track.classList.add('dragging');},
  move(e){
    if(!this.dragging)return;
    const dx=e.clientX-this.startX,dy=e.clientY-this.startY;
    if(this.axis===null){
      if(Math.abs(dx)<6&&Math.abs(dy)<6)return;
      this.axis=Math.abs(dx)>Math.abs(dy)?'x':'y';
      if(this.axis==='y'){this.dragging=false;this.track.classList.remove('dragging');return;}
      this._swiped=true;
    }
    e.preventDefault();
    let x=this.baseX+dx,min=-(SCENES.length-1)*this.w;
    if(x>0)x*=0.35; if(x<min)x=min+(x-min)*0.35;
    this._x=x;
    if(!this._raf)this._raf=requestAnimationFrame(()=>{this.track.style.transform=`translate3d(${this._x}px,0,0)`;this._raf=0;});
  },
  up(){
    if(!this.dragging)return; this.dragging=false;
    const moved=(this._x??this.baseX)-this.baseX;
    if(Math.abs(moved)>this.w*0.18)this.i+=moved<0?1:-1;
    this.i=Math.max(0,Math.min(SCENES.length-1,this.i));
    this.snap(true);
    setTimeout(()=>{this._swiped=false;},50);
  },
  snap(anim){
    if(!this.track)return;
    this.track.classList.toggle('dragging',!anim);
    this._x=-this.i*this.w;
    this.track.style.transform=`translate3d(${this._x}px,0,0)`;
    document.querySelectorAll('#pageDots i').forEach((d,k)=>d.classList.toggle('on',k===this.i));
    const l=document.querySelector('.edge-hint.l'),r=document.querySelector('.edge-hint.r');
    if(l)l.classList.toggle('hide',this.i===0);
    if(r)r.classList.toggle('hide',this.i===SCENES.length-1);
    if(SCENES[this.i]!=='home'&&isOnUpperPlatform()){resetPetPlatform();setPetPos(petAnim.px,petAnim.py);}
    if(SCENES[this.i]==='kitchen')resetKitchenIdle();
    else if(tiger4Anim.kitchen.state!=='idle')resetKitchenIdle();
    updateFoodFab();
    if(!anim)requestAnimationFrame(()=>this.track.classList.remove('dragging'));
  }
};
/* 食物背包 FAB 只在餐廳頁顯示；離開餐廳時關閉背包 */
function updateFoodFab(){
  const fab=$('#foodInvFab'); if(!fab)return;
  const onKitchen=(typeof SceneCarousel!=='undefined' && SCENES[SceneCarousel.i]==='kitchen');
  fab.style.display=onKitchen?'':'none';
  if(!onKitchen && typeof foodInvOpen!=='undefined' && foodInvOpen)closeFoodInventory();
}
function initScenes(){
  SceneCarousel.init();
  if(typeof FOODBAG_IMG!=='undefined'){const ic=$('#foodBagIc'); if(ic)ic.src=FOODBAG_IMG;}
  updateFoodFab();
  if(typeof renderMiniPets==='function')renderMiniPets();
  syncFoodInvHint();
  $('#foodInv')?.addEventListener('click',e=>{if(e.target.id==='foodInv')closeFoodInventory();});
  const bind=(sel,scene)=>{const el=document.querySelector(sel); if(el)el.onclick=()=>SceneCarousel.go(scene);};
  bind('.pstat.hunger','kitchen'); bind('.pstat.happy','home'); bind('.pstat.health','bedroom');
}

/* ===== 啟動 ===== */
document.querySelectorAll('.tab').forEach(b=>{b.onclick=()=>switchTab(b.dataset.tab);const img=b.querySelector('img.em');if(img&&NAV_ICON[b.dataset.tab])img.src=NAV_ICON[b.dataset.tab];});
setSheetTitle(curTab);
document.querySelectorAll('#pet,.scene-pet').forEach(p=>{p.onclick=e=>{e.stopPropagation();playWithPet();};});
scheduleHomeObject(2500); // 開場 2.5 秒後在浮島放第一個陪玩物件
initPetMovement();
if(MONEY_IMG.coin)$('#coinIc').src=MONEY_IMG.coin;
else if(typeof COIN_IMG_SRC!=='undefined')$('#coinIc').src=encodeURI(COIN_IMG_SRC);
if(MONEY_IMG.gem)$('#gemIc').src=MONEY_IMG.gem;
if(ISLAND_IMG)$('#isleImg').src=ISLAND_IMG;
makeRain();
rollDay();
if(!S.onboarded){startOnboard();}
else{if(S.pet.animal==null)S.pet.animal=PET_TIGER_IDX;decay();S._lastDecay=Date.now();renderAll();setTimeout(()=>sayPetLine(null,LINES.idle),600);}
layoutSheet();
initScenes();
scheduleTimeOfDay();
if(isTigerSprite()){loadTigerSheets();loadTiger4Sheet();loadFoodSheet();}
setInterval(()=>{decay();renderScene();save();},60000);
// 浮島碎念：寵物依當下狀態主動說話（用內建台詞，不呼叫 API、不花 token）
function contextualLine(){
  const p=S.pet, m=todayStr().slice(0,7); let exp=0;
  S.tx.forEach(t=>{if(t.ts.slice(0,7)===m&&t.type==='expense')exp+=t.amount;});
  if(isTigerSprite()&&isOnUpperPlatform()&&isMoodComfortable()){
    const platformLine=petPlatformDialogue();
    if(platformLine)return platformLine;
  }
  const moodLine=petMoodDialogue();
  if(p.hunger<30)return pick(LINES.hungry);
  if(exp>S.budget||p.health<30)return petMoodDialogue(Math.min(moodValue(),MOOD.LOW))||pick(LINES.over);
  if(exp>S.budget*0.75)return petMoodDialogue(MOOD.COMFORT)||'這個月快到預算上限囉，省著點花好嗎？🐾';
  if(moodLine)return moodLine;
  if(exp>0&&exp<S.budget*0.4)return pick(LINES.save);
  return pick(LINES.idle);
}
function proactiveChatter(){
  if($('#onboard').style.display!=='none')return; // 測驗/聊天/設定彈窗開著時不打擾
  if(document.hidden||S.pet.stage<2)return;
  say(contextualLine());
}
// 閒置碎念：主人沒動作時，每 5~10 分鐘才換一句（不花 token）
function scheduleChatter(){
  const ms=300000+Math.random()*300000; // 5~10 分鐘
  clearTimeout(window._chatterT);
  window._chatterT=setTimeout(()=>{proactiveChatter();scheduleChatter();},ms);
}
scheduleChatter();
