# Render Blueprint — 一鍵部署設定
# 到 render.com → New → Blueprint，連到這個 repo 即可；或手動建立 Web Service 也行。
services:
  - type: web
    name: floating-island-ledger
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: GEMINI_API_KEY
        sync: false            # 不寫在檔案裡，改在 Render 後台輸入（機密）
      - key: GEMINI_MODEL
        value: gemini-flash-latest
